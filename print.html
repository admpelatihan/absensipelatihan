<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar Hadir Pelatihan — PT Sido Muncul</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #059669;
  --navy: #1a1a2e;
  --font: 'Plus Jakarta Sans', Arial, sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:#f1f5f9;color:#0f172a;}

/* ── SCREEN BAR ── */
#screen-bar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:#fff;border-bottom:1px solid #e2e8f0;
  padding:10px 20px;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.sl{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;}
.sl img{height:28px;}
.lbx{width:28px;height:28px;background:linear-gradient(135deg,#059669,#10b981);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:11px;}
#scr-sub{flex:1;font-size:13px;font-weight:500;color:#64748b;}
.btn-p{display:flex;align-items:center;gap:6px;padding:8px 16px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;min-height:36px;}
.btn-p:hover{background:#047857;}
.btn-b{display:flex;align-items:center;gap:6px;padding:8px 13px;background:#fff;color:#64748b;border:1px solid #e2e8f0;border-radius:8px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;min-height:36px;}
.btn-b:hover{background:#f8fafc;}

/* ── WRAPPERS ── */
#pw{padding:70px 20px 40px;display:flex;justify-content:center;}

#lw{text-align:center;padding:80px 20px;display:none;}
#lw.show{display:block;}
.sp{width:34px;height:34px;border:3px solid #e2e8f0;border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.lt{font-size:14px;color:#64748b;font-weight:500;}

#ew{text-align:center;padding:80px 20px;display:none;}
#ew.show{display:block;}
.ei{width:54px;height:54px;background:#fee2e2;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;}
.em{font-size:13px;color:#64748b;margin-top:5px;}

/* ══════════════════════════════════════
   DOKUMEN CETAK — F4 = 215mm x 330mm
══════════════════════════════════════ */
#pd{
  width:215mm;
  min-height:310mm;
  background:#fff;
  padding:8mm;
  box-shadow:0 4px 20px rgba(0,0,0,.12);
  display:none;
  font-family:Arial,sans-serif;
  font-size:9pt;
  color:#000;
}
#pd.show{display:block;}

/* ── Header tabel ── */
.dh{width:100%;border-collapse:collapse;table-layout:fixed;}
.dh td{border:1px solid #000;padding:3px 5px;vertical-align:middle;}
.hl{width:25%;text-align:center;}
.hl img{height:40px;width:auto;object-fit:contain;display:block;margin:0 auto;}
.hl-fb{font-weight:700;font-size:8pt;text-align:center;display:none;}
.hm{width:50%;text-align:center;font-size:12pt;font-weight:700;line-height:1.4;}
.hr{width:25%;text-align:right;font-size:8pt;line-height:1.5;}
.hll{width:25%;font-size:8pt;}
.hmm{width:50%;}

/* ── Info pelatihan ── */
.di{width:100%;border-collapse:collapse;table-layout:fixed;border-top:none;}
.di td{border:1px solid #000;border-top:none;padding:0;vertical-align:top;}
.di-inner{width:100%;border-collapse:collapse;}
.di-inner td{border:none;padding:2px 4px;font-size:8.5pt;vertical-align:top;}
.lbl{font-weight:700;white-space:nowrap;}
.sep{width:10px;text-align:center;}

/* ── Tabel peserta ── */
.dp{width:100%;border-collapse:collapse;table-layout:fixed;border-top:none;}
.dp thead th{
  background:#1a1a2e !important;
  -webkit-print-color-adjust:exact;
  print-color-adjust:exact;
  color:#fff !important;
  font-size:8.5pt;font-weight:700;
  text-align:center;padding:4px 3px;
  border:1px solid #000;line-height:1.3;
}
.dp tbody td{
  border:1px solid #000;border-top:none;
  padding:2px 3px;font-size:8pt;
  vertical-align:middle;height:20px;
}
.dp tbody tr.even td{
  background:#f8fafc !important;
  -webkit-print-color-adjust:exact;
  print-color-adjust:exact;
}
.dp tbody tr.odd td{background:#fff !important;}
.cn{width:4%;text-align:center;}
.cna{width:28%;}
.ci{width:14%;text-align:center;}
.cu{width:13%;text-align:center;}
.cj{width:16%;}
.ct{width:25%;text-align:center;}
.ttd-img{max-height:17px;max-width:100%;object-fit:contain;display:block;margin:0 auto;}

/* ══════════════════════════════════════
   PRINT
══════════════════════════════════════ */
@page{size:215mm 330mm;margin:8mm;}
@media print{
  .no-print,#screen-bar{display:none !important;}
  body{background:#fff !important;}
  #pw{padding:0 !important;display:block !important;}
  #lw,#ew{display:none !important;}
  #pd{
    display:block !important;
    width:100% !important;
    min-height:auto !important;
    padding:0 !important;
    box-shadow:none !important;
    margin:0 !important;
  }
  .dp thead th{
    background:#1a1a2e !important;
    -webkit-print-color-adjust:exact !important;
    print-color-adjust:exact !important;
    color:#fff !important;
  }
  .dp tbody tr.even td{
    background:#f8fafc !important;
    -webkit-print-color-adjust:exact !important;
    print-color-adjust:exact !important;
  }
  table{page-break-inside:avoid;}
}
</style>
</head>
<body>

<!-- SCREEN BAR -->
<div id="screen-bar" class="no-print">
  <div class="sl">
    <img src="logo.png" alt="SM" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="lbx" style="display:none">SM</div>
    <span>Sido Muncul</span>
  </div>
  <div id="scr-sub">Daftar Hadir Pelatihan</div>
  <button class="btn-b" onclick="history.back()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polyline points="15 18 9 12 15 6"/></svg>
    Kembali
  </button>
  <button class="btn-p" onclick="window.print()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
      <polyline points="6 9 6 2 18 2 18 9"/>
      <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
      <rect x="6" y="14" width="12" height="8"/>
    </svg>
    Cetak / Simpan PDF
  </button>
</div>

<div id="pw">
  <!-- LOADING -->
  <div id="lw">
    <div class="sp"></div>
    <div class="lt">Memuat daftar hadir...</div>
  </div>

  <!-- ERROR -->
  <div id="ew">
    <div class="ei">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" width="26" height="26">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
    </div>
    <div style="font-size:15px;font-weight:700" id="et">Terjadi Kesalahan</div>
    <div class="em" id="em">—</div>
  </div>

  <!-- PRINT DOC -->
  <div id="pd">

    <!-- HEADER BARIS 1 & 2 -->
    <table class="dh">
      <colgroup><col style="width:25%"><col style="width:50%"><col style="width:25%"></colgroup>
      <tbody>
        <tr>
          <td class="hl" rowspan="2">
            <img src="logo.png" alt="Sido Muncul"
              onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
            <div class="hl-fb">PT SIDO MUNCUL</div>
          </td>
          <td class="hm" rowspan="2">DAFTAR HADIR PESERTA PELATIHAN</td>
          <td class="hr">No. Form: FM-082020-01-00-003</td>
        </tr>
        <tr>
          <td class="hr" style="font-size:7.5pt;line-height:1.6">Revisi: 02<br>Tgl Berlaku: 25 Mei 2016</td>
        </tr>
        <tr>
          <td class="hll">HR-MI / PELATIHAN</td>
          <td class="hmm"></td>
          <td class="hr"></td>
        </tr>
      </tbody>
    </table>

    <!-- INFO PELATIHAN -->
    <table class="di" id="tbl-info"></table>

    <!-- TABEL PESERTA -->
    <table class="dp">
      <thead>
        <tr>
          <th class="cn">No.</th>
          <th class="cna">Nama Lengkap</th>
          <th class="ci">No. Induk<br>(Perner)</th>
          <th class="cu">Unit</th>
          <th class="cj">Jabatan</th>
          <th class="ct">Paraf / TTD</th>
        </tr>
      </thead>
      <tbody id="tbl-body"></tbody>
    </table>

  </div><!-- /#pd -->
</div><!-- /#pw -->

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import {
  getFirestore, doc, getDoc, getDocs,
  collection, query, where
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyDTVdA6QD_FsHeHVMm4l67NJP5_rpL_JmI",
  authDomain: "absensipelatihan-844d8.firebaseapp.com",
  projectId: "absensipelatihan-844d8",
  storageBucket: "absensipelatihan-844d8.firebasestorage.app",
  messagingSenderId: "518545818905",
  appId: "1:518545818905:web:d56035cc0678c58328f188"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);
const ROWS = 35;

async function retry(fn,n=3,d=1200){
  for(let i=0;i<n;i++){try{return await fn();}catch(e){if(i===n-1)throw e;await new Promise(r=>setTimeout(r,d));}}
}

function showLoading(v){document.getElementById('lw').classList.toggle('show',v);}
function showErr(t,m){
  showLoading(false);
  document.getElementById('et').textContent=t;
  document.getElementById('em').textContent=m;
  document.getElementById('ew').classList.add('show');
}
function showDoc(){showLoading(false);document.getElementById('pd').classList.add('show');}

function hariIndo(ds){
  if(!ds)return'';
  return['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'][new Date(ds).getDay()];
}
function fmtTgl(ds){
  if(!ds)return'—';
  const d=new Date(ds);
  const m=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  return`${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear()}`;
}
function esc(s){
  if(!s)return'';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Cek session
function checkSession(){
  return new Promise(res=>{
    const uid=sessionStorage.getItem('uid');
    if(uid){res(uid);return;}
    const u=onAuthStateChanged(auth,user=>{u();res(user?user.uid:null);});
    setTimeout(()=>res(null),5000);
  });
}

async function init(){
  showLoading(true);

  const params=new URLSearchParams(location.search);
  const id=params.get('id');
  if(!id){showErr('ID Tidak Valid','Parameter ID pelatihan tidak ditemukan di URL.');return;}

  const uid=await checkSession();
  if(!uid){
    showErr('Sesi Berakhir','Anda perlu login kembali untuk mencetak daftar hadir.');
    setTimeout(()=>{window.location.href='index.html';},2500);
    return;
  }

  try{
    // Load pelatihan
    const ps=await retry(()=>getDoc(doc(db,'pelatihan',id)));
    if(!ps.exists()){showErr('Tidak Ditemukan',`Data pelatihan "${id}" tidak ada.`);return;}
    const pel={id,...ps.data()};

    // Load absensi
    const as=await retry(()=>getDocs(query(collection(db,'absensi'),where('id_pelatihan','==',id))));
    const absList=as.docs.map(d=>d.data());
    if(!absList.length){showErr('Belum Ada Absensi','Belum ada peserta yang melakukan absensi untuk pelatihan ini.');return;}

    // Load karyawan
    const peserta=[];
    for(const abs of absList){
      let k={nama_lengkap:abs.perner,unit:'—',jabatan:'—'};
      try{
        const ks=await retry(()=>getDoc(doc(db,'karyawan',abs.perner)));
        if(ks.exists())k=ks.data();
      }catch(e){}
      peserta.push({
        perner:abs.perner,
        nama:k.nama_lengkap||abs.perner,
        unit:k.unit||'—',
        jabatan:k.jabatan||'—',
        ttd:abs.ttd_base64||'',
      });
    }
    peserta.sort((a,b)=>a.nama.localeCompare(b.nama));

    renderInfo(pel);
    renderPeserta(peserta);
    document.getElementById('scr-sub').textContent=`${pel.topik||'Pelatihan'} — ${pel.tanggal||''}`;
    showDoc();

    // Auto print setelah render selesai
    setTimeout(()=>window.print(),900);

  }catch(e){showErr('Gagal Memuat','Error: '+e.message);}
}

function renderInfo(p){
  const hari=p.hari||hariIndo(p.tanggal);
  const rows=[
    {l1:'Hari/Tanggal',v1:`${hari}, ${fmtTgl(p.tanggal)}`, l2:'Topik',         v2:p.topik||'—'},
    {l1:'Waktu',        v1:`${p.waktu_mulai||'—'} – ${p.waktu_selesai||'—'}`, l2:'Instruktur',    v2:p.instruktur||'—'},
    {l1:'Tempat',       v1:p.lokasi||'—',                   l2:'Penyelenggara', v2:p.penyelenggara||'—'},
    {l1:'',             v1:'',                               l2:'Batch',         v2:p.batch||'—'},
  ];
  document.getElementById('tbl-info').innerHTML=rows.map(r=>`
    <tr>
      <td style="width:50%;padding:0;border:1px solid #000;border-top:none">
        <table class="di-inner" style="width:100%;border-collapse:collapse">
          <tr>
            <td style="width:92px;border:none;padding:2px 5px;font-size:8.5pt;font-weight:700;white-space:nowrap">${esc(r.l1)}</td>
            <td style="width:10px;border:none;padding:2px 0;font-size:8.5pt;text-align:center">${r.l1?':':''}</td>
            <td style="border:none;padding:2px 4px;font-size:8.5pt">${esc(r.v1)}</td>
          </tr>
        </table>
      </td>
      <td style="width:50%;padding:0;border:1px solid #000;border-top:none;border-left:none">
        <table class="di-inner" style="width:100%;border-collapse:collapse">
          <tr>
            <td style="width:92px;border:none;padding:2px 5px;font-size:8.5pt;font-weight:700;white-space:nowrap">${esc(r.l2)}</td>
            <td style="width:10px;border:none;padding:2px 0;font-size:8.5pt;text-align:center">${r.l2?':':''}</td>
            <td style="border:none;padding:2px 4px;font-size:8.5pt">${esc(r.v2)}</td>
          </tr>
        </table>
      </td>
    </tr>`).join('');
}

function renderPeserta(list){
  let html='';
  for(let i=0;i<ROWS;i++){
    const p=list[i]||null;
    const cls=(i+1)%2===0?'even':'odd';
    if(p){
      html+=`<tr class="${cls}">
        <td class="cn">${i+1}</td>
        <td class="cna" style="font-weight:500">${esc(p.nama)}</td>
        <td class="ci">${esc(p.perner)}</td>
        <td class="cu">${esc(p.unit)}</td>
        <td class="cj">${esc(p.jabatan)}</td>
        <td class="ct">${p.ttd?`<img src="${p.ttd}" class="ttd-img" alt="TTD">`:''}</td>
      </tr>`;
    }else{
      html+=`<tr class="${cls}" style="height:20px">
        <td class="cn" style="font-size:8pt">${i+1}</td>
        <td class="cna"></td><td class="ci"></td>
        <td class="cu"></td><td class="cj"></td><td class="ct"></td>
      </tr>`;
    }
  }
  document.getElementById('tbl-body').innerHTML=html;
}

init();
</script>
</body>
</html>
