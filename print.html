/* ══ SCREEN UI ══ */
.screen-bar {
  position: sticky; top: 0; z-index: 50;
  background: white; border-bottom: 1px solid #f1f5f9;
  padding: 14px 32px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,.04);
}
.screen-brand {
  display: flex; align-items: center; gap: 10px;
}
.screen-brand-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: #064e3b; color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.screen-brand-text {
  font-size: 14px; font-weight: 900; color: #0f172a;
  text-transform: uppercase; letter-spacing: -0.3px;
}
.screen-info {
  font-size: 11px; font-weight: 700; color: #94a3b8;
  text-transform: uppercase; letter-spacing: 1px;
  flex: 1; text-align: center;
}
.btn-action-bar {
  display: flex; gap: 8px;
}
.btn-back {
  padding: 8px 16px; border-radius: 12px;
  border: 1.5px solid #e2e8f0; background: white;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 10px; font-weight: 900; text-transform: uppercase;
  letter-spacing: 0.5px; color: #64748b; cursor: pointer;
  transition: all .2s; display: flex; align-items: center; gap: 6px;
}
.btn-back:hover { background: #f8fafc; border-color: #94a3b8; }
.btn-print {
  padding: 8px 18px; border-radius: 12px; border: none;
  background: #064e3b; color: white;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 10px; font-weight: 900; text-transform: uppercase;
  letter-spacing: 0.5px; cursor: pointer;
  transition: all .2s; display: flex; align-items: center; gap: 6px;
  box-shadow: 0 4px 12px rgba(6,78,59,.2);
}
.btn-print:hover { background: #059669; transform: translateY(-1px); }

.paper-wrapper {
  display: flex; justify-content: center;
  padding: 28px 16px 48px;
  min-height: calc(100vh - 65px);
}

/* Loading state */
.loading-screen {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 80px 20px; gap: 16px;
}
.spin {
  width: 40px; height: 40px;
  border: 3px solid #d1fae5; border-top-color: #059669;
  border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-screen p {
  font-size: 10px; font-weight: 900; color: #94a3b8;
  text-transform: uppercase; letter-spacing: 2px;
}

/* ══ FORM PAPER (A4) ══ */
.form-paper {
  background: white;
  width: 210mm;
  min-height: 297mm;
  padding: 10mm 12mm;
  box-shadow: 0 8px 32px rgba(0,0,0,.10);
}

/* Header table — 3 columns exactly as FM-082020-01-00-003 */
.tbl-header { width: 100%; border-collapse: collapse; }
.tbl-header td { border: 1px solid #000; vertical-align: middle; padding: 4px 7px; }

.cell-brand { width: 24%; text-align: center; padding: 8px !important; }
.cell-brand img { height: 54px; display: block; margin: 0 auto 4px; object-fit: contain; }
.cell-brand .lbl-hr   { font-size: 9pt; font-weight: 800; display: block; margin-top: 5px; }
.cell-brand .lbl-plt  { font-size: 9pt; font-weight: 800; display: block; margin-top: 2px; }

.cell-title { width: 38%; text-align: center; padding: 12px 8px !important; }
.cell-title .t1 { font-size: 15pt; font-weight: 900; display: block; letter-spacing: .5px; line-height: 1.2; }
.cell-title .t2 { font-size: 12pt; font-weight: 800; display: block; margin-top: 6px; line-height: 1.2; }

.cell-forminfo { width: 22%; vertical-align: top; padding: 6px 8px !important; font-size: 8pt; }
.fi-row { display: flex; gap: 4px; margin-bottom: 4px; font-size: 8pt; }
.fi-lbl { font-weight: 800; white-space: nowrap; min-width: 60px; }

/* Info table */
.tbl-info { width: 100%; border-collapse: collapse; }
.tbl-info td { border: 1px solid #000; padding: 5px 8px; font-size: 9pt; vertical-align: middle; }
.info-lbl  { font-weight: 800; white-space: nowrap; width: 80px; }
.info-sep  { width: 10px; text-align: center; font-weight: 800; }
.info-val  { min-width: 110px; }
.info-gap  {
  width: 14px;
  border-top: 1px solid #000 !important;
  border-bottom: 1px solid #000 !important;
  border-left: none !important;
  border-right: none !important;
  padding: 0 !important;
}

/* Peserta table */
.tbl-peserta { width: 100%; border-collapse: collapse; }
.tbl-peserta th {
  background: #1e2a4a !important;
  color: white !important;
  font-size: 9pt; font-weight: 800;
  padding: 8px 6px; border: 1px solid #000;
  text-align: center;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}
.col-no      { width: 4%; }
.col-nama    { width: 30%; text-align: left !important; }
.col-induk   { width: 14%; }
.col-unit    { width: 12%; }
.col-jabatan { width: 18%; }
.col-paraf   { width: 22%; }

.tbl-peserta td {
  border: 1px solid #000;
  padding: 3px 6px;
  font-size: 8.5pt;
  height: 21px;
  vertical-align: middle;
}
.td-no    { text-align: center; }
.td-paraf { text-align: center; padding: 2px 3px; }
.td-paraf img { max-height: 15px; max-width: 90%; object-fit: contain; }

.row-even td {
  background: #f0f4f8 !important;
  -webkit-print-color-adjust: exact !important;
  print-color-adjust: exact !important;
}

/* ══ PRINT STYLES ══ */
@media print {
  @page { size: A4; margin: 10mm 12mm; }
  body { background: white !important; }
  .screen-bar    { display: none !important; }
  .paper-wrapper {
    padding: 0 !important;
    background: white !important;
    min-height: unset;
    display: block;
  }
  .form-paper {
    box-shadow: none !important;
    width: 100% !important;
    padding: 0 !important;
    min-height: unset;
  }
  .loading-screen { display: none !important; }
  .tbl-peserta th {
    background: #1e2a4a !important;
    color: white !important;
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }
  .row-even td {
    background: #f0f4f8 !important;
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }
}

<body>

<!-- Screen bar (hidden on print) -->

<div class="screen-bar">
  <div class="screen-brand">
    <div class="screen-brand-icon"><i class="fas fa-leaf"></i></div>
    <div class="screen-brand-text">E-Attendance</div>
  </div>
  <div class="screen-info" id="screenInfo">Memuat daftar hadir…</div>
  <div class="btn-action-bar">
    <button class="btn-back" onclick="window.close()">
      <i class="fas fa-arrow-left"></i> Tutup
    </button>
    <button class="btn-print" onclick="window.print()">
      <i class="fas fa-print"></i> Cetak / Simpan PDF
    </button>
  </div>
</div>

<!-- Paper wrapper -->

<div class="paper-wrapper">
  <div class="form-paper" id="formPaper">
    <div class="loading-screen" id="loadingScreen">
      <div class="spin"></div>
      <p>Memuat Data Daftar Hadir…</p>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword }
                           from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, doc, getDoc, getDocs, collection, query, where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyDTVdA6QD_FsHeHVMm4l67NJP5_rpL_JmI",
  authDomain:"absensipelatihan-844d8.firebaseapp.com",
  projectId:"absensipelatihan-844d8",
  storageBucket:"absensipelatihan-844d8.firebasestorage.app",
  messagingSenderId:"518545818905",
  appId:"1:518545818905:web:d56035cc0678c58328f188"
};
const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

const params = new URLSearchParams(location.search);
const pltId  = params.get('id') || '';

const HARI  = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
const BULAN = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];

function fmtTgl(ds) {
  if (!ds) return '–';
  const d = new Date(ds + 'T00:00:00');
  return `${HARI[d.getDay()]} / ${String(d.getDate()).padStart(2,'0')} ${BULAN[d.getMonth()]} ${d.getFullYear()}`;
}

async function doAuth() {
  const ae = sessionStorage.getItem('__ae');
  const ap = sessionStorage.getItem('__ap');
  if (ae && ap) {
    try { await signInWithEmailAndPassword(auth, atob(ae), atob(ap)); } catch(_) {}
  }
}

async function init() {
  if (!pltId) {
    document.getElementById('formPaper').innerHTML =
      '<p style="padding:48px;color:#e11d48;text-align:center;font-size:12px;font-weight:800;text-transform:uppercase">ID Pelatihan tidak ditemukan.</p>';
    return;
  }
  await doAuth();

  try {
    const pltSnap = await getDoc(doc(db, 'pelatihan', pltId));
    if (!pltSnap.exists()) {
      document.getElementById('formPaper').innerHTML =
        '<p style="padding:48px;color:#e11d48;text-align:center;font-size:12px;font-weight:800;text-transform:uppercase">Pelatihan tidak ditemukan.</p>';
      return;
    }
    const plt = { id: pltSnap.id, ...pltSnap.data() };

    // Load peserta (deduplicated)
    const ppSnap = await getDocs(
      query(collection(db,'peserta_pelatihan'), where('id_pelatihan','==',pltId))
    );
    const perners = [...new Set(ppSnap.docs.map(d => d.data().perner))];

    // Load karyawan map
    const kSnap = await getDocs(collection(db,'karyawan'));
    const karyMap = {};
    kSnap.docs.forEach(d => { karyMap[d.id] = d.data(); });

    // Load TTD map
    const abSnap = await getDocs(
      query(collection(db,'absensi'), where('id_pelatihan','==',pltId))
    );
    const abMap = {};
    abSnap.docs.forEach(d => { const x = d.data(); abMap[x.perner] = x.ttd_base64; });

    const peserta = perners.map(p => ({
      perner : p,
      kary   : karyMap[p] || { nama_lengkap: p, unit: '–', jabatan: '–' }
    }));

    // Update screen info
    document.getElementById('screenInfo').textContent =
      `${plt.topik} — ${peserta.length} Peserta`;
    document.title = `Daftar Hadir – ${plt.topik}`;

    renderForm(plt, peserta, abMap);
    setTimeout(() => window.print(), 900);

  } catch(e) {
    document.getElementById('formPaper').innerHTML =
      `<p style="padding:48px;color:#e11d48;text-align:center;font-size:12px;font-weight:800;text-transform:uppercase">Gagal memuat: ${e.message}</p>`;
  }
}

function renderForm(plt, pesertaList, abMap) {
  const TOTAL_ROWS = 35;

  // Always render exactly 35 rows as per original form FM-082020-01-00-003
  const rows = Array.from({ length: TOTAL_ROWS }, (_, i) => {
    const pe      = pesertaList[i];
    const isEven  = i % 2 === 1;
    const no      = pe ? String(i + 1) : '';
    const nama    = pe?.kary?.nama_lengkap || '';
    const perner  = pe?.perner || '';
    const unit    = pe?.kary?.unit || '';
    const jabatan = pe?.kary?.jabatan || '';
    const ttd     = pe ? (abMap[perner] || '') : '';

    return `
      <tr${isEven ? ' class="row-even"' : ''}>
        <td class="td-no">${no}</td>
        <td>${nama}</td>
        <td style="text-align:center">${perner}</td>
        <td style="text-align:center">${unit}</td>
        <td style="text-align:center">${jabatan}</td>
        <td class="td-paraf">${ttd ? `<img src="${ttd}" alt="TTD"/>` : '&nbsp;'}</td>
      </tr>`;
  }).join('');

  const waktu = `${plt.waktu_mulai || '–'} - ${plt.waktu_selesai || '–'}`;

  document.getElementById('formPaper').innerHTML = `

    <!-- ═══ HEADER TABLE ═══ -->
    <table class="tbl-header">
      <tr>
        <!-- Col 1: Logo + HR-MI + PELATIHAN (rowspan 2) -->
        <td class="cell-brand" rowspan="2">
          <img src="logo.png" alt="Sido Muncul"
            onerror="this.outerHTML='<div style=\\'font-size:9pt;font-weight:900;margin-bottom:4px;text-transform:uppercase\\'>SIDO MUNCUL</div>'"
          />
          <span class="lbl-hr">HR-MI</span>
          <span class="lbl-plt">PELATIHAN</span>
        </td>

        <!-- Col 2: Judul (rowspan 2) -->
        <td class="cell-title" rowspan="2">
          <span class="t1">DAFTAR HADIR</span>
          <span class="t2">PESERTA PELATIHAN</span>
        </td>

        <!-- Col 3 row 1: No.Form + Revisi -->
        <td class="cell-forminfo">
          <div class="fi-row">
            <span class="fi-lbl">No. Form</span>
            <span>:</span>
            <span style="font-weight:700"><strong>FM-082020-01-00-003</strong></span>
          </div>
          <div class="fi-row">
            <span class="fi-lbl">Revisi</span>
            <span>:</span>
            <span>02</span>
          </div>
        </td>
      </tr>
      <tr>
        <!-- Col 3 row 2: Tgl Berlaku -->
        <td class="cell-forminfo">
          <div class="fi-row">
            <span class="fi-lbl">Tgl. Berlaku</span>
            <span>:</span>
            <span>25 Mei 2016</span>
          </div>
        </td>
      </tr>
    </table>

    <!-- ═══ INFO PELATIHAN ═══ -->
    <table class="tbl-info">
      <tr>
        <td class="info-lbl">Hari / Tanggal</td>
        <td class="info-sep">:</td>
        <td class="info-val">${fmtTgl(plt.tanggal)}</td>
        <td class="info-gap"></td>
        <td class="info-lbl">Topik</td>
        <td class="info-sep">:</td>
        <td class="info-val">${plt.topik || '–'}</td>
      </tr>
      <tr>
        <td class="info-lbl">Waktu</td>
        <td class="info-sep">:</td>
        <td class="info-val">${waktu}</td>
        <td class="info-gap"></td>
        <td class="info-lbl">Instruktur</td>
        <td class="info-sep">:</td>
        <td class="info-val">${plt.instruktur || '–'}</td>
      </tr>
      <tr>
        <td class="info-lbl">Tempat</td>
        <td class="info-sep">:</td>
        <td class="info-val">${plt.lokasi || '–'}</td>
        <td class="info-gap"></td>
        <td class="info-lbl">Penyelenggara</td>
        <td class="info-sep">:</td>
        <td class="info-val">${plt.penyelenggara || plt.unit_pembuat || '–'}</td>
      </tr>
    </table>

    <!-- ═══ TABEL PESERTA (35 baris tetap) ═══ -->
    <table class="tbl-peserta">
      <thead>
        <tr>
          <th class="col-no">No.</th>
          <th class="col-nama" style="text-align:left;padding-left:7px">Nama Lengkap</th>
          <th class="col-induk">No. Induk</th>
          <th class="col-unit">Unit</th>
          <th class="col-jabatan">Jabatan</th>
          <th class="col-paraf">Paraf</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>

    <div style="margin-top:14px;font-size:7.5pt;font-style:italic;color:#64748b">
      * Dokumen ini dicetak melalui E-Attendance System PT Sido Muncul pada
      <span>${new Date().toLocaleString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'})}</span>.
      Format: FM-082020-01-00-003 Rev.02
    </div>
  `;
}

init();
</script>

</body>
