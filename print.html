<style>
:root { --primary: #059669; --font: 'Plus Jakarta Sans', Arial, sans-serif; }
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:#f1f5f9;color:#0f172a;}

#screen-bar{position:fixed;top:0;left:0;right:0;z-index:100;background:#fff;border-bottom:1px solid #e2e8f0;padding:10px 20px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.sl{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;}
.sl img{height:28px;}
.lbx{width:28px;height:28px;background:linear-gradient(135deg,#059669,#10b981);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:11px;}
#scr-sub{flex:1;font-size:13px;font-weight:500;color:#64748b;}
.btn-p{display:flex;align-items:center;gap:6px;padding:8px 16px;background:var(–primary);color:#fff;border:none;border-radius:8px;font-family:var(–font);font-size:13px;font-weight:700;cursor:pointer;min-height:36px;}
.btn-p:hover{background:#047857;}
.btn-b{display:flex;align-items:center;gap:6px;padding:8px 13px;background:#fff;color:#64748b;border:1px solid #e2e8f0;border-radius:8px;font-family:var(–font);font-size:13px;font-weight:600;cursor:pointer;min-height:36px;}
.btn-b:hover{background:#f8fafc;}

#pw{padding:70px 20px 40px;display:flex;justify-content:center;}
#lw{text-align:center;padding:80px 20px;display:none;}
#lw.show{display:block;}
.sp{width:34px;height:34px;border:3px solid #e2e8f0;border-top-color:var(–primary);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.lt{font-size:14px;color:#64748b;font-weight:500;}
#ew{text-align:center;padding:80px 20px;display:none;}
#ew.show{display:block;}
.ei{width:54px;height:54px;background:#fee2e2;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;}
.em{font-size:13px;color:#64748b;margin-top:5px;}

/* ── HEADER UTAMA ── */
.hdr-table{width:100%;border-collapse:collapse;border:1px solid #000;table-layout:fixed;}
.hdr-table td{border:1px solid #000;vertical-align:middle;}
.hdr-logo-cell{width:22%;padding:6px 8px;text-align:center;vertical-align:middle;}
.hdr-logo-cell img{max-height:55px;max-width:100%;object-fit:contain;display:block;margin:0 auto;}
.hdr-logo-cell .fb{font-weight:700;font-size:9pt;text-align:center;}
.hdr-sub-cell{width:22%;padding:5px 8px;vertical-align:top;}
.hdr-sub-cell .dept{font-size:9pt;font-weight:700;color:#000;margin-bottom:2px;}
.hdr-sub-cell .sub{font-size:8pt;font-weight:700;color:#000;}
.hdr-title-cell{width:34%;text-align:center;padding:6px 4px;vertical-align:middle;}
.hdr-title-cell .t1{font-size:14pt;font-weight:700;line-height:1.3;}
.hdr-title-cell .t2{font-size:13pt;font-weight:700;line-height:1.3;}
.hdr-meta-cell{width:22%;padding:5px 8px;font-size:7.5pt;vertical-align:top;line-height:1.8;}
.hdr-meta-cell .mrow{display:flex;gap:2px;}
.hdr-meta-cell .ml{white-space:nowrap;}
.hdr-meta-cell .mv{font-weight:700;}

/* ── INFO PELATIHAN ── */
.info-table{width:100%;border-collapse:collapse;border:1px solid #000;border-top:none;table-layout:fixed;}
.info-table td{border:1px solid #000;padding:4px 8px;font-size:8.5pt;vertical-align:middle;}
.info-table .lbl{font-weight:700;white-space:nowrap;width:22%;}
.info-table .sep{width:8px;text-align:center;padding:4px 2px;}
.info-table .val{padding:4px 6px;}
.info-table .lbl2{font-weight:700;white-space:nowrap;width:18%;}

/* ── TABEL PESERTA ── */
.peserta-table{width:100%;border-collapse:collapse;border:1px solid #000;border-top:none;table-layout:fixed;}
.peserta-table thead th{
background:#1e2a4a !important;
-webkit-print-color-adjust:exact;
print-color-adjust:exact;
color:#fff !important;
font-size:9pt;font-weight:700;
text-align:center;padding:5px 3px;
border:1px solid #000;line-height:1.3;
}
.peserta-table tbody td{
border:1px solid #000;
padding:1px 3px;font-size:8pt;
vertical-align:middle;height:19px;
}
.peserta-table tbody tr.even td{background:#f0f4f8 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.peserta-table tbody tr.odd td{background:#fff !important;}
.col-no{width:4%;text-align:center;}
.col-nama{width:30%;}
.col-perner{width:14%;text-align:center;}
.col-unit{width:12%;text-align:center;}
.col-jabatan{width:18%;}
.col-paraf{width:22%;text-align:center;}
.ttd-img{max-height:16px;max-width:95%;object-fit:contain;display:block;margin:0 auto;}

@page{size:A4;margin:10mm 12mm;}
@media print{
.no-print,#screen-bar{display:none !important;}
body{background:#fff !important;}
#pw{padding:0 !important;display:block !important;}
#lw,#ew{display:none !important;}
#pd{display:block !important;width:100% !important;min-height:auto !important;padding:0 !important;box-shadow:none !important;margin:0 !important;}
.peserta-table thead th{background:#1e2a4a !important;-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;color:#fff !important;}
.peserta-table tbody tr.even td{background:#f0f4f8 !important;-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;}
table{page-break-inside:avoid;}
}
</style>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, getDocs, collection, query, where } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyDTVdA6QD_FsHeHVMm4l67NJP5_rpL_JmI",
  authDomain: "absensipelatihan-844d8.firebaseapp.com",
  projectId: "absensipelatihan-844d8",
  storageBucket: "absensipelatihan-844d8.firebasestorage.app",
  messagingSenderId: "518545818905",
  appId: "1:518545818905:web:d56035cc0678c58328f188"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);
const ROWS = 35;

async function retry(fn,n=3,d=1200){
  for(let i=0;i<n;i++){try{return await fn();}catch(e){if(i===n-1)throw e;await new Promise(r=>setTimeout(r,d));}}
}

function showLoading(v){document.getElementById('lw').classList.toggle('show',v);}
function showErr(t,m){
  showLoading(false);
  document.getElementById('et').textContent=t;
  document.getElementById('em').textContent=m;
  document.getElementById('ew').classList.add('show');
}
function showDoc(){showLoading(false);document.getElementById('pd').classList.add('show');}

function hariIndo(ds){
  if(!ds)return'';
  return['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'][new Date(ds).getDay()];
}

// Format: "Senin / 23 Mar 2026" — sesuai contoh PDF
function fmtTglShort(ds){
  if(!ds)return'—';
  const d=new Date(ds);
  const m=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  const hari=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'][d.getDay()];
  return`${hari} / ${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear()}`;
}

function esc(s){
  if(!s)return'';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function checkAuth(){
  return new Promise(async res=>{
    const uid=sessionStorage.getItem('uid');
    if(uid){ res(uid); return; }
    // Coba re-auth dari session
    try {
      const ae=sessionStorage.getItem('__ae');
      const ap=sessionStorage.getItem('__ap');
      if(ae&&ap){
        const r=await signInWithEmailAndPassword(auth,atob(ae),atob(ap));
        res(r.user.uid); return;
      }
    } catch(e){}
    const u=onAuthStateChanged(auth,user=>{u();res(user?user.uid:null);});
    setTimeout(()=>res(null),5000);
  });
}

async function init(){
  showLoading(true);
  const params=new URLSearchParams(location.search);
  const id=params.get('id');
  if(!id){showErr('ID Tidak Valid','Parameter ID pelatihan tidak ditemukan di URL.');return;}

  const uid=await checkAuth();
  if(!uid){
    showErr('Sesi Berakhir','Anda perlu login kembali untuk mencetak daftar hadir.');
    setTimeout(()=>{window.location.href='index.html';},2500);
    return;
  }

  try{
    const ps=await retry(()=>getDoc(doc(db,'pelatihan',id)));
    if(!ps.exists()){showErr('Tidak Ditemukan',`Data pelatihan "${id}" tidak ada.`);return;}
    const pel={id,...ps.data()};

    // Load semua peserta (dari peserta_pelatihan, bukan hanya yang absen)
    const ppSnap=await retry(()=>getDocs(query(collection(db,'peserta_pelatihan'),where('id_pelatihan','==',id))));
    const perners=[...new Set(ppSnap.docs.map(d=>d.data().perner))];

    // Load absensi
    const as=await retry(()=>getDocs(query(collection(db,'absensi'),where('id_pelatihan','==',id))));
    const absList=as.docs.map(d=>d.data());
    const absMap={};
    absList.forEach(a=>absMap[a.perner]=a);

    if(!perners.length){showErr('Belum Ada Peserta','Belum ada peserta yang terdaftar untuk pelatihan ini.');return;}

    const peserta=[];
    for(const perner of perners){
      let k={nama_lengkap:perner,unit:'—',jabatan:'—'};
      try{
        const ks=await retry(()=>getDoc(doc(db,'karyawan',perner)));
        if(ks.exists())k=ks.data();
      }catch(e){}
      peserta.push({
        perner,
        nama:k.nama_lengkap||perner,
        unit:k.unit||'—',
        jabatan:k.jabatan||'—',
        ttd:absMap[perner]?.ttd_base64||'',
      });
    }
    peserta.sort((a,b)=>a.nama.localeCompare(b.nama));

    renderInfo(pel);
    renderPeserta(peserta);
    document.getElementById('scr-sub').textContent=`${pel.topik||'Pelatihan'} — ${pel.tanggal||''}`;
    showDoc();
    setTimeout(()=>window.print(),900);

  }catch(e){showErr('Gagal Memuat','Error: '+e.message);}
}

function renderInfo(p){
  const tglStr = fmtTglShort(p.tanggal);
  // 3 baris, tiap baris: [label kiri | sep | val kiri | | label kanan | sep | val kanan]
  const rows=[
    { l1:'Hari / Tanggal', v1:tglStr,            l2:'Topik',         v2:p.topik||'—' },
    { l1:'Waktu',          v1:`${p.waktu_mulai||'—'} - ${p.waktu_selesai||'—'}`, l2:'Instruktur', v2:p.instruktur||'—' },
    { l1:'Tempat',         v1:p.lokasi||'—',     l2:'Penyelenggara', v2:p.penyelenggara||'—' },
  ];
  document.getElementById('tbl-info').innerHTML=rows.map(r=>`
    <tr>
      <td class="lbl">${esc(r.l1)}</td>
      <td class="sep">:</td>
      <td class="val">${esc(r.v1)}</td>
      <td style="width:1px;border-left:1px solid #000;padding:0"></td>
      <td class="lbl2">${esc(r.l2)}</td>
      <td class="sep">:</td>
      <td class="val">${esc(r.v2)}</td>
    </tr>`).join('');
}

function renderPeserta(list){
  let html='';
  for(let i=0;i<ROWS;i++){
    const p=list[i]||null;
    const cls=(i+1)%2===0?'even':'odd';
    if(p){
      html+=`<tr class="${cls}">
        <td class="col-no">${i+1}</td>
        <td class="col-nama" style="font-weight:500">${esc(p.nama)}</td>
        <td class="col-perner">${esc(p.perner)}</td>
        <td class="col-unit">${esc(p.unit)}</td>
        <td class="col-jabatan">${esc(p.jabatan)}</td>
        <td class="col-paraf">${p.ttd?`<img src="${p.ttd}" class="ttd-img" alt="TTD">`:''}</td>
      </tr>`;
    }else{
      html+=`<tr class="${cls}" style="height:19px">
        <td class="col-no" style="font-size:8pt;color:#999">${i+1}</td>
        <td class="col-nama"></td>
        <td class="col-perner"></td>
        <td class="col-unit"></td>
        <td class="col-jabatan"></td>
        <td class="col-paraf"></td>
      </tr>`;
    }
  }
  document.getElementById('tbl-body').innerHTML=html;
}

init();
</script>
