<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMART • Daftar Hadir Pelatihan</title>

<style>
:root { --primary:#059669; --navy:#1a1a2e; --font:'Plus Jakarta Sans',Arial,sans-serif; }
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:#f1f5f9;color:#0f172a;}

/* ── SCREEN BAR ── */
#screen-bar{
position:fixed;top:0;left:0;right:0;z-index:100;
background:#fff;border-bottom:1px solid #e2e8f0;
padding:10px 20px;display:flex;align-items:center;gap:10px;
box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.sl{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;font-family:var(–font);}
.sl img{height:28px;}
.lbx{width:28px;height:28px;background:linear-gradient(135deg,#059669,#10b981);border-radius:7px;
display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:11px;display:none;}
#scr-sub{flex:1;font-size:13px;font-weight:500;color:#64748b;font-family:var(–font);}
.btn-p{display:flex;align-items:center;gap:6px;padding:8px 16px;background:var(–primary);color:#fff;
border:none;border-radius:8px;font-family:var(–font);font-size:13px;font-weight:700;cursor:pointer;min-height:36px;}
.btn-p:hover{background:#047857;}
.btn-b{display:flex;align-items:center;gap:6px;padding:8px 13px;background:#fff;color:#64748b;
border:1px solid #e2e8f0;border-radius:8px;font-family:var(–font);font-size:13px;font-weight:600;
cursor:pointer;min-height:36px;}
.btn-b:hover{background:#f8fafc;}

/* ── WRAPPERS ── */
#pw{padding:70px 20px 40px;display:flex;justify-content:center;}
#lw{text-align:center;padding:80px 20px;display:none;}
#lw.show{display:block;}
.sp{width:34px;height:34px;border:3px solid #e2e8f0;border-top-color:var(–primary);
border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.lt{font-size:14px;color:#64748b;font-weight:500;font-family:var(–font);}
#ew{text-align:center;padding:80px 20px;display:none;}
#ew.show{display:block;}
.ei{width:54px;height:54px;background:#fee2e2;border-radius:50%;
display:flex;align-items:center;justify-content:center;margin:0 auto 10px;}
.em{font-size:13px;color:#64748b;margin-top:5px;font-family:var(–font);}

/* ══════════════════════════════════════
DOKUMEN CETAK — F4 = 215mm x 330mm
══════════════════════════════════════ */
#pd{
width:215mm;
background:#fff;
padding:8mm;
box-shadow:0 4px 20px rgba(0,0,0,.12);
display:none;
font-family:Arial,sans-serif;
font-size:9pt;
color:#000;
}
#pd.show{display:block;}

/* ── HEADER TABLE ── */
.tbl-header{
width:100%;
border-collapse:collapse;
table-layout:fixed;
}
.tbl-header td{
border:1px solid #000;
vertical-align:middle;
}

/* Kolom logo */
.col-logo{
width:22%;
text-align:center;
padding:6px;
}
.col-logo img{
height:44px;
width:auto;
object-fit:contain;
display:block;
margin:0 auto;
}
.col-logo-fb{
font-weight:700;font-size:8pt;text-align:center;
display:none;line-height:1.3;
}

/* Kolom judul tengah */
.col-judul{
width:56%;
text-align:center;
padding:6px 4px;
line-height:1.35;
}
.col-judul .judul-utama{
font-size:13pt;
font-weight:700;
letter-spacing:0.3px;
}
.col-judul .judul-sub{
font-size:12pt;
font-weight:700;
}

/* Kolom kanan (nomor form, revisi) */
.col-kanan{
width:22%;
padding:4px 6px;
font-size:8pt;
vertical-align:top;
line-height:1.7;
}

/* Baris HR-MI */
.col-hrmi{
width:22%;
padding:3px 6px;
font-size:8.5pt;
font-weight:700;
vertical-align:middle;
}
.col-hrmi-mid{
width:56%;
padding:3px 6px;
font-size:8.5pt;
vertical-align:top;
}
.col-hrmi-mid .sub-label{
font-weight:700;
font-size:8pt;
}

/* Baris PELATIHAN label */
.col-pel-label{
width:22%;
padding:3px 6px;
font-size:8.5pt;
font-weight:700;
vertical-align:middle;
border-top:none;
}

/* ── INFO PELATIHAN ── */
.tbl-info{
width:100%;
border-collapse:collapse;
table-layout:fixed;
}
.tbl-info td{
border:1px solid #000;
border-top:none;
padding:0;
vertical-align:top;
}
.info-cell{
width:50%;
padding:0;
}
.info-inner{
width:100%;
border-collapse:collapse;
}
.info-inner td{
border:none;
padding:2.5px 5px;
font-size:8.5pt;
vertical-align:top;
}
.info-lbl{
width:88px;
font-weight:700;
white-space:nowrap;
}
.info-sep{
width:8px;
text-align:center;
}
.info-val{
/* nilai bisa panjang */
}

/* ── TABEL PESERTA ── */
.tbl-peserta{
width:100%;
border-collapse:collapse;
table-layout:fixed;
border-top:none;
}
.tbl-peserta thead th{
background:#1a1a2e !important;
-webkit-print-color-adjust:exact;
print-color-adjust:exact;
color:#fff !important;
font-size:8.5pt;
font-weight:700;
text-align:center;
padding:4px 3px;
border:1px solid #000;
border-top:none;
line-height:1.3;
}
.tbl-peserta tbody td{
border:1px solid #000;
border-top:none;
padding:1.5px 3px;
font-size:8pt;
vertical-align:middle;
height:19.5px;
}
.tbl-peserta tbody tr.even td{
background:#f8fafc !important;
-webkit-print-color-adjust:exact;
print-color-adjust:exact;
}
.tbl-peserta tbody tr.odd td{background:#fff !important;}

/* Lebar kolom tabel peserta — total 100% */
.col-no   {width:5%;  text-align:center;}
.col-nama {width:30%;}
.col-nik  {width:14%; text-align:center;}
.col-unit {width:12%; text-align:center;}
.col-jab  {width:15%;}
.col-ttd  {width:24%; text-align:center;}

.ttd-img{
max-height:17px;
max-width:100%;
object-fit:contain;
display:block;
margin:0 auto;
}

/* ══════════════════════════════════════
PRINT MEDIA
══════════════════════════════════════ */
@page{size:215mm 330mm;margin:8mm;}
@media print{
.no-print,#screen-bar{display:none !important;}
body{background:#fff !important;}
#pw{padding:0 !important;display:block !important;}
#lw,#ew{display:none !important;}
#pd{
display:block !important;
width:100% !important;
min-height:auto !important;
padding:0 !important;
box-shadow:none !important;
margin:0 !important;
}
.tbl-peserta thead th{
background:#1a1a2e !important;
-webkit-print-color-adjust:exact !important;
print-color-adjust:exact !important;
color:#fff !important;
}
.tbl-peserta tbody tr.even td{
background:#f8fafc !important;
-webkit-print-color-adjust:exact !important;
print-color-adjust:exact !important;
}
}
</style>

</head>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import {
  getFirestore, doc, getDoc, getDocs,
  collection, query, where
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyDTVdA6QD_FsHeHVMm4l67NJP5_rpL_JmI",
  authDomain: "absensipelatihan-844d8.firebaseapp.com",
  projectId: "absensipelatihan-844d8",
  storageBucket: "absensipelatihan-844d8.firebasestorage.app",
  messagingSenderId: "518545818905",
  appId: "1:518545818905:web:d56035cc0678c58328f188"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);
const ROWS = 35;

async function retry(fn, n=3, d=1200) {
  for (let i=0; i<n; i++) {
    try { return await fn(); }
    catch(e) { if(i===n-1) throw e; await new Promise(r=>setTimeout(r,d)); }
  }
}

function showLoading(v) {
  document.getElementById('lw').style.display = v ? 'block' : 'none';
  document.getElementById('pw').style.paddingTop = v ? '70px' : '70px';
}
function showErr(t, m) {
  showLoading(false);
  document.getElementById('et').textContent = t;
  document.getElementById('em').textContent = m;
  document.getElementById('ew').style.display = 'block';
}
function showDoc() {
  showLoading(false);
  document.getElementById('pd').classList.add('show');
}

function hariIndo(ds) {
  if (!ds) return '';
  const d = new Date(ds + 'T00:00:00');
  return ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'][d.getDay()];
}
function fmtTgl(ds) {
  if (!ds) return '—';
  const d = new Date(ds + 'T00:00:00');
  const m = ['Januari','Februari','Maret','April','Mei','Juni',
             'Juli','Agustus','September','Oktober','November','Desember'];
  return `${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear()}`;
}
function esc(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Cek sesi login
function checkSession() {
  return new Promise(res => {
    const uid = sessionStorage.getItem('uid');
    if (uid) { res(uid); return; }
    const unsub = onAuthStateChanged(auth, user => { unsub(); res(user ? user.uid : null); });
    setTimeout(() => res(null), 5000);
  });
}

async function init() {
  showLoading(true);

  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  if (!id) { showErr('ID Tidak Valid', 'Parameter ID pelatihan tidak ditemukan di URL.'); return; }

  const uid = await checkSession();
  if (!uid) {
    showErr('Sesi Berakhir', 'Anda perlu login kembali untuk mencetak daftar hadir.');
    setTimeout(() => { window.location.href = 'index.html'; }, 2500);
    return;
  }

  try {
    // Load pelatihan
    const ps = await retry(() => getDoc(doc(db, 'pelatihan', id)));
    if (!ps.exists()) { showErr('Tidak Ditemukan', `Data pelatihan "${id}" tidak ada.`); return; }
    const pel = { id, ...ps.data() };

    // Load absensi yang sudah TTD
    const as = await retry(() => getDocs(
      query(collection(db, 'absensi'), where('id_pelatihan', '==', id))
    ));
    const absList = as.docs.map(d => d.data()).filter(a => a.ttd_base64);
    if (!absList.length) {
      showErr('Belum Ada Absensi', 'Belum ada peserta yang melakukan tanda tangan untuk pelatihan ini.');
      return;
    }

    // Load data karyawan setiap peserta
    const peserta = [];
    for (const abs of absList) {
      let k = { nama_lengkap: abs.perner, unit: '—', jabatan: '—' };
      try {
        const ks = await retry(() => getDoc(doc(db, 'karyawan', abs.perner)));
        if (ks.exists()) k = ks.data();
      } catch(e) {}
      peserta.push({
        perner:  abs.perner,
        nama:    k.nama_lengkap || abs.perner,
        unit:    k.unit    || '—',
        jabatan: k.jabatan || '—',
        ttd:     abs.ttd_base64 || '',
      });
    }
    peserta.sort((a,b) => a.nama.localeCompare(b.nama));

    renderInfo(pel);
    renderPeserta(peserta);
    document.getElementById('scr-sub').textContent =
      `${pel.topik || 'Pelatihan'} — ${hariIndo(pel.tanggal)}, ${fmtTgl(pel.tanggal)}`;
    showDoc();

    // Auto print setelah render
    setTimeout(() => window.print(), 900);

  } catch(e) { showErr('Gagal Memuat', 'Error: ' + e.message); }
}

function renderInfo(p) {
  const hari = p.hari || hariIndo(p.tanggal);
  // 3 baris info sesuai format PDF asli
  const rows = [
    {
      l1:'Hari / Tanggal', v1:`${hari} / ${fmtTgl(p.tanggal)}`,
      l2:'Topik',          v2: p.topik || '—'
    },
    {
      l1:'Waktu',          v1:`${p.waktu_mulai||'—'} - ${p.waktu_selesai||'—'}`,
      l2:'Instruktur',     v2: p.instruktur || '—'
    },
    {
      l1:'Tempat',         v1: p.lokasi || '—',
      l2:'Penyelenggara',  v2: p.penyelenggara || '—'
    },
  ];

  document.getElementById('tbl-info').innerHTML = rows.map(r => `
    <tr>
      <td class="info-cell" style="width:50%;border-left:1px solid #000;border-right:1px solid #000;border-bottom:1px solid #000;">
        <table class="info-inner">
          <tr>
            <td class="info-lbl">${esc(r.l1)}</td>
            <td class="info-sep">:</td>
            <td class="info-val">${esc(r.v1)}</td>
          </tr>
        </table>
      </td>
      <td class="info-cell" style="width:50%;border-right:1px solid #000;border-bottom:1px solid #000;">
        <table class="info-inner">
          <tr>
            <td class="info-lbl">${esc(r.l2)}</td>
            <td class="info-sep">:</td>
            <td class="info-val">${esc(r.v2)}</td>
          </tr>
        </table>
      </td>
    </tr>
  `).join('');
}

function renderPeserta(list) {
  let html = '';
  for (let i = 0; i < ROWS; i++) {
    const p   = list[i] || null;
    const cls = (i % 2 === 0) ? 'odd' : 'even';
    if (p) {
      html += `<tr class="${cls}">
        <td class="col-no">${i+1}</td>
        <td class="col-nama" style="font-weight:500">${esc(p.nama)}</td>
        <td class="col-nik">${esc(p.perner)}</td>
        <td class="col-unit">${esc(p.unit)}</td>
        <td class="col-jab">${esc(p.jabatan)}</td>
        <td class="col-ttd">${p.ttd ? `<img src="${p.ttd}" class="ttd-img" alt="TTD">` : ''}</td>
      </tr>`;
    } else {
      html += `<tr class="${cls}" style="height:19.5px">
        <td class="col-no" style="font-size:8pt">${i+1}</td>
        <td class="col-nama"></td>
        <td class="col-nik"></td>
        <td class="col-unit"></td>
        <td class="col-jab"></td>
        <td class="col-ttd"></td>
      </tr>`;
    }
  }
  document.getElementById('tbl-body').innerHTML = html;
}

init();
</script>
