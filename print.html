<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Daftar Hadir — E-Attendance Sido Muncul</title>
<link rel="icon" href="favicon.png" type="image/png"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#f8fafc;-webkit-font-smoothing:antialiased;}

/* ── SCREEN TOOLBAR ── */
.toolbar{
position:sticky;top:0;z-index:50;
background:#fff;border-bottom:1px solid #e2e8f0;
padding:11px 22px;
display:flex;align-items:center;justify-content:space-between;gap:12px;
box-shadow:0 1px 4px rgba(0,0,0,.05);
font-family:‘Plus Jakarta Sans’,Arial,sans-serif;
}
.brand{display:flex;align-items:center;gap:9px;}
.brand-icon{width:30px;height:30px;border-radius:8px;background:#064e3b;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;}
.brand-name{font-size:13px;font-weight:900;color:#0f172a;text-transform:uppercase;letter-spacing:-.2px;}
.screen-info{font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;flex:1;text-align:center;}
.btn-back{padding:7px 13px;border-radius:9px;border:1.5px solid #e2e8f0;background:#fff;font-family:inherit;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;color:#64748b;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s;}
.btn-back:hover{background:#f8fafc;}
.btn-print{padding:7px 16px;border-radius:9px;border:none;background:#064e3b;color:#fff;font-family:inherit;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s;}
.btn-print:hover{background:#059669;}

.paper-wrap{display:flex;justify-content:center;padding:22px 14px 44px;}

/* ── LOADING ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:14px;}
.spin{width:36px;height:36px;border:3px solid #d1fae5;border-top-color:#059669;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:10px;font-weight:900;color:#94a3b8;text-transform:uppercase;letter-spacing:2px;}

/* ════════════════════
FORM PAPER — F4
════════════════════ */
.paper{
background:#fff;
width:215mm;
min-height:330mm;
padding:8mm 10mm;
box-shadow:0 6px 28px rgba(0,0,0,.12);
font-family:Arial,sans-serif;
}
.outer{border:1.5px solid #000;width:100%;}

/* HEADER TABLE */
.ht{width:100%;border-collapse:collapse;}

.c-logo{
width:22%;border-right:1.5px solid #000;
vertical-align:top;padding:0;
}
.logo-zone{
padding:6px 6px 5px;text-align:center;
border-bottom:1.5px solid #000;
}
.logo-img{height:40px;display:block;margin:0 auto;object-fit:contain;}
.logo-fb{font-size:9pt;font-weight:900;color:#064e3b;line-height:1.2;}
.hrmi-zone{
padding:4px 6px;font-size:8.5pt;font-weight:900;
text-align:center;border-bottom:1.5px solid #000;
}
.plt-zone{
padding:4px 6px;font-size:8.5pt;font-weight:900;
text-align:center;border-bottom:1.5px solid #000;
}

.c-title{
width:46%;text-align:center;vertical-align:middle;
border-right:1.5px solid #000;border-bottom:1.5px solid #000;
padding:10px 8px;
}
.t1{font-size:14pt;font-weight:900;display:block;letter-spacing:.3px;}
.t2{font-size:11pt;font-weight:700;display:block;margin-top:5px;}

.c-fi{
width:32%;vertical-align:middle;
padding:6px 8px;border-bottom:1.5px solid #000;
}
.fi-line{display:flex;gap:4px;align-items:baseline;font-size:8.5pt;line-height:1.85;}
.fi-lbl{font-weight:700;min-width:68px;white-space:nowrap;}

/* INFO PELATIHAN */
.it{width:100%;border-collapse:collapse;}
.it td{padding:4px 8px;font-size:9pt;vertical-align:middle;border-bottom:1px solid #000;}
.il{font-weight:700;white-space:nowrap;width:80px;}
.is{width:8px;font-weight:700;text-align:center;}
.iv{color:#1a4fa8;font-weight:600;}
.ig{width:10px;padding:0!important;border-right:1.5px solid #000!important;border-left:none!important;}
.imb{border-left:1.5px solid #000;}

/* PESERTA TABLE */
.pt{width:100%;border-collapse:collapse;}
.pt th{
background:#1e2a4a;color:#fff;
font-size:9pt;font-weight:800;
padding:6px 4px;text-align:center;
border-right:1px solid #3a4a6a;
-webkit-print-color-adjust:exact;print-color-adjust:exact;
}
.pt th:last-child{border-right:none;}
.cn {width:5%;}
.cna{width:26%;text-align:left!important;}
.ci {width:13%;}
.cu {width:10%;}
.cj {width:14%;}
.cp {width:32%;}

.pt tbody tr{border-bottom:1px solid #b8c0cc;}
.pt tbody tr:last-child{border-bottom:none;}
.pt td{padding:0 4px;font-size:8.5pt;vertical-align:middle;height:26px;}
.dn {text-align:center;font-weight:700;color:#000;}
.dna{color:#1a4fa8;font-weight:600;padding-left:5px;}
.di {text-align:center;color:#1a4fa8;font-weight:600;}
.du {text-align:center;color:#1a4fa8;font-weight:600;}
.dj {text-align:center;color:#1a4fa8;font-weight:600;}
.dp {padding:1px 3px;vertical-align:middle;}

/* Zigzag signatures */
.so{display:flex;align-items:center;gap:4px;padding-left:4px;}
.se{display:flex;align-items:center;gap:4px;padding-left:35%;}
.sn{font-size:8pt;font-weight:700;color:#000;min-width:14px;flex-shrink:0;}
.sig-img{max-height:26px;max-width:84px;object-fit:contain;}

.re td{background:#eef0f5!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
.fn{font-size:7pt;font-style:italic;color:#64748b;margin-top:8px;}

/* PRINT */
@media print{
@page{size:215mm 330mm;margin:8mm 10mm;}
body{background:#fff!important;}
.toolbar{display:none!important;}
.paper-wrap{padding:0!important;background:#fff!important;display:block;}
.paper{box-shadow:none!important;width:100%!important;padding:0!important;min-height:unset;}
.loading{display:none!important;}
.pt th{background:#1e2a4a!important;color:#fff!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
.re td{background:#eef0f5!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
}
</style>

</head>
<body>

<div class="toolbar">
  <div class="brand">
    <div class="brand-icon">🌿</div>
    <div class="brand-name">E-Attendance</div>
  </div>
  <div class="screen-info" id="screenInfo">Memuat daftar hadir…</div>
  <div style="display:flex;gap:8px;">
    <button class="btn-back" onclick="window.close()">← Kembali</button>
    <button class="btn-print" onclick="window.print()">🖨 Cetak / PDF</button>
  </div>
</div>

<div class="paper-wrap">
  <div class="paper" id="formPaper">
    <div class="loading" id="loadScreen">
      <div class="spin"></div>
      <p>Memuat Data Daftar Hadir…</p>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
                           from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, doc, getDoc, getDocs, collection, query, where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const FB={apiKey:"AIzaSyDTVdA6QD_FsHeHVMm4l67NJP5_rpL_JmI",authDomain:"absensipelatihan-844d8.firebaseapp.com",projectId:"absensipelatihan-844d8",storageBucket:"absensipelatihan-844d8.firebasestorage.app",messagingSenderId:"518545818905",appId:"1:518545818905:web:d56035cc0678c58328f188"};
const app=initializeApp(FB);
const auth=getAuth(app);
const db=getFirestore(app);

const params=new URLSearchParams(location.search);
const pltId=params.get('id')||'';

const HARI=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
const BULAN=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];

function fmtTgl(ds){
  if(!ds)return'–';
  const d=new Date(ds+'T00:00:00');
  return`${HARI[d.getDay()]} / ${String(d.getDate()).padStart(2,'0')} ${BULAN[d.getMonth()]} ${d.getFullYear()}`;
}

/* Re-auth — skip if already authenticated to prevent session interference */
async function doAuth(){
  if(auth.currentUser) return;
  const ae=localStorage.getItem('__ae');
  const ap=localStorage.getItem('__ap');
  if(ae&&ap){
    try{await signInWithEmailAndPassword(auth,atob(ae),atob(ap));return;}catch(_){}
  }
}

async function init(){
  if(!pltId){
    document.getElementById('formPaper').innerHTML='<p style="padding:40px;color:#e11d48;text-align:center;font-size:12px;font-weight:800;text-transform:uppercase">ID Pelatihan tidak ditemukan.</p>';
    return;
  }
  /* Wait for Firebase to restore persisted session first */
  await new Promise(resolve=>{
    const unsub=onAuthStateChanged(auth,user=>{unsub();resolve(user);});
    setTimeout(()=>resolve(null),3000);
  });
  /* Only re-auth if not already signed in */
  if(!auth.currentUser) await doAuth();

  try{
    const pltSnap=await getDoc(doc(db,'pelatihan',pltId));
    if(!pltSnap.exists()){
      document.getElementById('formPaper').innerHTML='<p style="padding:40px;color:#e11d48;text-align:center;font-size:12px;font-weight:800;text-transform:uppercase">Pelatihan tidak ditemukan.</p>';
      return;
    }
    const plt={id:pltSnap.id,...pltSnap.data()};

    const ppSnap=await getDocs(query(collection(db,'peserta_pelatihan'),where('id_pelatihan','==',pltId)));
    const perners=[...new Set(ppSnap.docs.map(d=>d.data().perner))];

    const kSnap=await getDocs(collection(db,'karyawan'));
    const kMap={};kSnap.docs.forEach(d=>{kMap[d.id]=d.data();});

    const abSnap=await getDocs(query(collection(db,'absensi'),where('id_pelatihan','==',pltId)));
    const abMap={};abSnap.docs.forEach(d=>{const x=d.data();abMap[x.perner]=x.ttd_base64;});

    const peserta=perners.map(p=>({perner:p,kary:kMap[p]||{nama_lengkap:p,unit:'–',jabatan:'–'}}));

    document.getElementById('screenInfo').textContent=`${plt.topik} — ${peserta.length} Peserta`;
    document.title=`Daftar Hadir – ${plt.topik}`;

    renderForm(plt,peserta,abMap);
    setTimeout(()=>window.print(),900);

  }catch(e){
    document.getElementById('formPaper').innerHTML=`<p style="padding:40px;color:#e11d48;text-align:center;font-size:12px;font-weight:800;text-transform:uppercase">Gagal memuat: ${e.message}</p>`;
  }
}

function renderForm(plt,pesertaList,abMap){
  const TOTAL=35;
  const waktu=`${plt.waktu_mulai||'–'} - ${plt.waktu_selesai||'–'}`;

  let rows='';
  for(let i=0;i<TOTAL;i++){
    const pe=pesertaList[i];
    const even=i%2===1;
    const n=i+1;
    const nama=pe?.kary?.nama_lengkap||'';
    const perner=pe?.perner||'';
    const unit=pe?.kary?.unit||'';
    const jabatan=pe?.kary?.jabatan||'';
    const ttd=pe?(abMap[perner]||''):'';  

    let parafCell='';
    const imgTag=ttd?`<img class="sig-img" src="${ttd}" alt="TTD"/>`:'';
    if(!even){
      parafCell=`<div class="so"><span class="sn">${n}.</span>${imgTag}</div>`;
    }else{
      parafCell=`<div class="se"><span class="sn">${n}.</span>${imgTag}</div>`;
    }

    rows+=`<tr${even?' class="re"':''}>
      <td class="dn">${n}</td>
      <td class="dna">${nama}</td>
      <td class="di">${perner}</td>
      <td class="du">${unit}</td>
      <td class="dj">${jabatan}</td>
      <td class="dp">${parafCell}</td>
    </tr>`;
  }

  document.getElementById('formPaper').innerHTML=`
  <div class="outer">

    <table class="ht">
      <tr>
        <td class="c-logo">
          <div class="logo-zone">
            <img class="logo-img" src="logo.png" alt=""
              onerror="this.style.display='none';this.nextElementSibling.style.display='block'"/>
            <div style="display:none;" class="logo-fb">SIDO<br>MUNCUL</div>
          </div>
          <div class="hrmi-zone">HR-MI</div>
          <div class="plt-zone">PELATIHAN</div>
        </td>
        <td class="c-title">
          <span class="t1">DAFTAR HADIR</span>
          <span class="t2">PESERTA PELATIHAN</span>
        </td>
        <td class="c-fi">
          <div class="fi-line"><span class="fi-lbl">No. Form</span><span>:</span><span style="font-weight:700;">FM-082020-01-00-003</span></div>
          <div class="fi-line"><span class="fi-lbl">Revisi</span><span>:</span><span>02</span></div>
          <div class="fi-line"><span class="fi-lbl">Tgl. Berlaku</span><span>:</span><span>25 Mei 2016</span></div>
        </td>
      </tr>
    </table>

    <table class="it">
      <tr>
        <td class="il">Hari / Tanggal</td><td class="is">:</td><td class="iv">${fmtTgl(plt.tanggal)}</td>
        <td class="ig" rowspan="3"></td>
        <td class="il imb">Topik</td><td class="is">:</td><td class="iv">${plt.topik||'–'}</td>
      </tr>
      <tr>
        <td class="il">Waktu</td><td class="is">:</td><td class="iv">${waktu}</td>
        <td class="il imb">Instruktur</td><td class="is">:</td><td class="iv">${plt.instruktur||'–'}</td>
      </tr>
      <tr>
        <td class="il">Tempat</td><td class="is">:</td><td class="iv">${plt.lokasi||'–'}</td>
        <td class="il imb">Penyelenggara</td><td class="is">:</td><td class="iv">${plt.penyelenggara||plt.unit_pembuat||'–'}</td>
      </tr>
    </table>

    <table class="pt">
      <thead>
        <tr>
          <th class="cn">No.</th>
          <th class="cna" style="text-align:left;padding-left:6px;">Nama Lengkap</th>
          <th class="ci">No. Induk</th>
          <th class="cu">Unit</th>
          <th class="cj">Jabatan</th>
          <th class="cp">Paraf</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>

  </div>
  <div class="fn">* Dicetak melalui E-Attendance System PT Sido Muncul pada ${new Date().toLocaleString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
  `;
}

init();
</script>

</body>
</html>
