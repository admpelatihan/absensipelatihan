<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMART · Sido Muncul</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #059669; /* Emerald-600 */
            --accent: #10b981;
            --bg: #f1f5f9;
            --sidebar: #ffffff;
            --text: #0f172a; /* Slate-900 */
        }

        /* RESET & BASE */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* ANIMASI UTAMA */
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(14px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-up { animation: fadeUp 0.35s ease-out forwards; }
        .delay-1 { animation-delay: 80ms; }
        .delay-2 { animation-delay: 160ms; }
        .delay-3 { animation-delay: 240ms; }

        /* LAYOUT MOBILE-FIRST */
        .app-container { display: flex; flex-direction: column; min-height: 100vh; }

        /* BOTTOM NAVIGATION (HP) */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 65px;
            background: white; display: flex; justify-content: space-around;
            align-items: center; border-top: 1px solid #e2e8f0; z-index: 100;
        }

        .nav-item { 
            display: flex; flex-direction: column; align-items: center; 
            font-size: 10px; color: #64748b; text-decoration: none; font-weight: 500;
            transition: 0.2s; padding: 8px;
        }
        .nav-item.active { color: var(--primary); font-weight: 700; transform: scale(1.1); }
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 4px; }

        /* HEADER & STAT CARDS */
        header { padding: 20px; background: white; margin-bottom: 10px; border-bottom: 1px solid #e2e8f0; }
        .user-card { display: flex; align-items: center; gap: 12px; margin-top: 10px; }
        .avatar { width: 44px; height: 44px; background: var(--bg); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; color: var(--primary); }
        
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; padding: 15px; }
        .stat-card { background: white; padding: 16px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .stat-card h3 { font-size: 12px; color: #64748b; margin-bottom: 8px; }
        .stat-card .value { font-size: 20px; font-weight: 800; color: var(--primary); }

        /* FILTER BAR */
        .filter-bar { padding: 0 15px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
        .filter-bar::-webkit-scrollbar { display: none; }
        select { padding: 8px 12px; border-radius: 10px; border: 1.5px solid #e2e8f0; background: white; font-size: 13px; outline: none; }

        /* MODAL & FORM */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; z-index: 200; align-items: flex-end; }
        .modal-content { background: white; width: 100%; border-radius: 24px 24px 0 0; padding: 24px; max-height: 90vh; overflow-y: auto; }
        
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
        input, datalist { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid #e2e8f0; font-size: 14px; }

        .btn { padding: 12px 20px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; min-height: 44px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-ghost { background: #f1f5f9; color: var(--text); }
        
        /* TOAST */
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 12px; color: white; display: none; z-index: 1000; font-size: 14px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="app-container">
    <header>
        <div id="userHeader" class="user-card animate-fade-up">
            </div>
    </header>

    <div class="filter-bar animate-fade-up delay-1">
        <select id="fUnit"><option value="Semua">Semua Unit</option><option>COD 1</option><option>COD 2</option><option>SF</option></select>
        <select id="fBulan">
            <option value="all">Semua Bulan</option>
            <option value="0">Januari</option><option value="1">Februari</option><option value="2">Maret</option>
            </select>
        <select id="fTahun"><option>2026</option><option>2025</option></select>
    </div>

    <main id="mainContent" style="padding-bottom: 80px;">
        </main>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active" onclick="loadDashboard()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
            Dashboard
        </a>
        <a href="#" class="nav-item" onclick="loadPelatihan()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
            Pelatihan
        </a>
        <a href="#" class="nav-item" onclick="loadKaryawan()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
            Karyawan
        </a>
        <a href="#" class="nav-item" onclick="logout()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"></path></svg>
            Keluar
        </a>
    </nav>
</div>

<script type="module">
    // --- FIREBASE CONFIG ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, addDoc, query, where, getDocs, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    const firebaseConfig = {
        // TEMPEL CONFIG ANDA DISINI
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;

    // --- AUTH CHECK ---
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "users", user.email.split('@')[0]));
            currentUser = userDoc.data();
            renderHeader();
            loadDashboard();
        } else {
            window.location.href = "index.html";
        }
    });

    function renderHeader() {
        const header = document.getElementById('userHeader');
        const today = new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        header.innerHTML = `
            <div class="avatar">${currentUser.nama_lengkap.charAt(0)}</div>
            <div>
                <div style="font-size: 14px;">Halo, <strong>${currentUser.nama_lengkap}</strong>! 👋</div>
                <div style="font-size: 12px; color: #64748b;">
                    <span style="background: ${currentUser.role === 'superadmin' ? '#f5f3ff' : '#ecfdf5'}; color: ${currentUser.role === 'superadmin' ? '#7c3aed' : '#059669'}; padding: 2px 8px; border-radius: 20px; font-weight: 700;">${currentUser.role.toUpperCase()}</span> 
                    · ${currentUser.unit}
                </div>
                <div style="font-size: 11px; margin-top: 4px; color: #94a3b8;">${today}</div>
            </div>
        `;
    }

    // --- FITUR BULK IMPORT ---
    window.importExcel = async (event) => {
        const file = event.target.files[0];
        const data = await file.arrayBuffer();
        const workbook = XLSX.read(data);
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet);

        showToast(`Memproses ${json.length} data...`, "#3b82f6");

        for(const row of json) {
            // Mapping kolom excel ke Firestore
            await addDoc(collection(db, "karyawan"), {
                perner: String(row.Perner),
                nama_lengkap: row.Nama,
                unit: row.Unit,
                bagian: row.Bagian,
                jabatan: row.Jabatan,
                status: "aktif",
                tgl_masuk: new Date().toISOString()
            });
        }
        showToast("Import Berhasil!", "#059669");
        loadKaryawan();
    };

    // --- SISTEM SPA NAVIGATION ---
    window.loadDashboard = () => {
        document.getElementById('mainContent').innerHTML = `
            <div class="stat-grid animate-fade-up delay-1">
                <div class="stat-card"><h3>Karyawan Aktif</h3><div class="value" id="valKaryawan">0</div></div>
                <div class="stat-card"><h3>Pelatihan Aktif</h3><div class="value" id="valPelatihan">0</div></div>
                <div class="stat-card"><h3>Total Jam</h3><div class="value" id="valJam">0</div></div>
            </div>
            `;
        // Panggil fungsi hitung stat berdasarkan filter
    };

    window.loadKaryawan = () => {
        document.getElementById('mainContent').innerHTML = `
            <div style="padding: 20px;" class="animate-fade-up">
                <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                    <h2 style="font-size: 18px;">Daftar Karyawan</h2>
                    <label class="btn btn-primary" style="font-size: 12px; display: flex; align-items: center;">
                        Import Excel <input type="file" hidden onchange="importExcel(event)" accept=".xlsx, .xls">
                    </label>
                </div>
                <input type="text" placeholder="Cari nama/perner..." style="margin-bottom: 15px;">
                <div id="listKaryawan"></div>
            </div>
        `;
    };

    window.showToast = (msg, color) => {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.background = color;
        t.style.display = "block";
        setTimeout(() => { t.style.display = "none"; }, 3000);
    };

    window.logout = () => {
        if(confirm("Yakin ingin keluar?")) signOut(auth);
    };

</script>
</body>
</html>
