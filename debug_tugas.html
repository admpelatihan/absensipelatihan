<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Debug Tugas Saya</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;padding:20px;min-height:100vh;}
h2{color:#34d399;margin-bottom:16px;font-size:18px;}
.card{background:#1e293b;border-radius:14px;padding:20px;margin-bottom:16px;border:1px solid #334155;}
input{width:100%;padding:10px 14px;background:#0f172a;border:1.5px solid #334155;border-radius:10px;color:#e2e8f0;font-size:14px;margin-bottom:10px;outline:none;}
input:focus{border-color:#059669;}
.btn{padding:10px 20px;border:none;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700;margin:4px;}
.btn-g{background:#059669;color:#fff;}
.btn-b{background:#3b82f6;color:#fff;}
.btn-r{background:#e11d48;color:#fff;}
.btn:hover{opacity:.85;}
.ok{color:#34d399;} .warn{color:#fbbf24;} .err{color:#f87171;}
#log{background:#020617;border:1px solid #1e293b;border-radius:10px;padding:15px;white-space:pre-wrap;max-height:350px;overflow-y:auto;font-size:11px;font-family:monospace;margin-top:10px;line-height:1.7;}
table{border-collapse:collapse;width:100%;font-size:11px;margin-top:12px;}
th,td{border:1px solid #334155;padding:6px 10px;text-align:left;vertical-align:top;}
th{background:#0f172a;color:#94a3b8;font-size:10px;text-transform:uppercase;}
tr:nth-child(even){background:#0f172a;}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;}
.badge-ok{background:#064e3b;color:#34d399;}
.badge-warn{background:#451a03;color:#fbbf24;}
.badge-err{background:#4c0519;color:#f87171;}
#loginSection{max-width:380px;margin:60px auto 0;}
</style>
</head>
<body>

<div id="loginSection">
  <div class="card">
    <h2>🔍 Debug Tugas Saya</h2>
    <p style="font-size:12px;color:#94a3b8;margin-bottom:16px;">Login dengan akun Superadmin atau Admin Plus.</p>
    <input type="text" id="inPerner" placeholder="Nomor Perner"/>
    <input type="password" id="inPw" placeholder="Password"/>
    <div id="loginErr" style="color:#f87171;font-size:12px;margin-bottom:8px;min-height:18px;"></div>
    <button class="btn btn-g" style="width:100%;" id="btnLogin">Login &amp; Diagnosa</button>
  </div>
</div>

<div id="debugSection" style="display:none;">
  <h2>🔍 Debug Tugas Saya</h2>
  <div class="card">
    <button class="btn btn-g" id="btnDiag">▶ Jalankan Diagnostik</button>
    <button class="btn btn-b" id="btnFix">🔧 Perbaiki Status Otomatis</button>
    <button class="btn btn-r" id="btnLogout">Keluar</button>
    <div id="log">Memuat...</div>
  </div>
  <div id="result"></div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getAuth,signInWithEmailAndPassword,signOut}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import{getFirestore,collection,getDocs,doc,updateDoc}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const cfg={apiKey:"AIzaSyDTVdA6QD_FsHeHVMm4l67NJP5_rpL_JmI",authDomain:"absensipelatihan-844d8.firebaseapp.com",projectId:"absensipelatihan-844d8"};
const app=initializeApp(cfg);
const auth=getAuth(app);
const db=getFirestore(app);

const logEl=()=>document.getElementById('log');
function log(msg,cls=''){
  const el=logEl();
  el.innerHTML+=`<span class="${cls}">${msg}\n</span>`;
  el.scrollTop=el.scrollHeight;
}
function clearLog(){logEl().innerHTML='';}

function normStatus(p){
  const st=p.status||'aktif';
  if(st==='selesai')return'ekpi_selesai';
  if(st==='aktif'&&p.absensi_ditutup_at)return'absensi_ditutup';
  if(st==='aktif'&&p.peserta_hadir!==undefined)return'absensi_ditutup';
  return st;
}
function fmtAt(v){
  if(!v)return'–';
  if(typeof v==='string')return v;
  if(v?.seconds)return new Date(v.seconds*1000).toLocaleString('id-ID');
  return JSON.stringify(v).slice(0,40);
}

/* ─ Login ─ */
document.getElementById('btnLogin').addEventListener('click',async()=>{
  const perner=document.getElementById('inPerner').value.trim();
  const pw=document.getElementById('inPw').value;
  const errEl=document.getElementById('loginErr');
  errEl.textContent='';
  if(!perner||!pw){errEl.textContent='Isi perner dan password';return;}
  const btn=document.getElementById('btnLogin');
  btn.textContent='Memproses…';btn.disabled=true;
  try{
    const email=perner==='200596'?'superadmin@absensipelatihan.com':`${perner}@absensipelatihan.com`;
    await signInWithEmailAndPassword(auth,email,pw);
    document.getElementById('loginSection').style.display='none';
    document.getElementById('debugSection').style.display='block';
    runDiag();
  }catch(e){
    const map={'auth/invalid-credential':'Perner atau password salah','auth/wrong-password':'Password salah','auth/user-not-found':'Akun tidak ditemukan','auth/too-many-requests':'Terlalu banyak percobaan, coba lagi nanti'};
    errEl.textContent=map[e.code]||e.message;
  }finally{btn.textContent='Login & Diagnosa';btn.disabled=false;}
});
document.getElementById('inPw').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('btnLogin').click();});

/* ─ Logout ─ */
document.getElementById('btnLogout').addEventListener('click',async()=>{await signOut(auth);location.reload();});

/* ─ Diagnostik ─ */
async function runDiag(){
  clearLog();
  document.getElementById('result').innerHTML='';
  log('📡 Mengambil data pelatihan dari Firestore...');
  try{
    const snap=await getDocs(collection(db,'pelatihan'));
    const all=snap.docs.map(d=>({id:d.id,...d.data()}));
    const nonExt=all.filter(p=>!p.id.startsWith('EXT-'));
    log(`✅ Total: ${all.length} dokumen (non-EXT: ${nonExt.length})`,'ok');

    // Status RAW
    const byRaw={};
    nonExt.forEach(p=>{const s=p.status||'(kosong)';byRaw[s]=(byRaw[s]||0)+1;});
    log('\n📊 Status RAW di Firestore:');
    Object.entries(byRaw).sort((a,b)=>b[1]-a[1]).forEach(([st,cnt])=>{
      const cls=['absensi_ditutup','pdf_tercetak'].includes(st)?'ok':st==='aktif'?'warn':'';
      log(`  "${st}" → ${cnt}`+' dok',cls);
    });

    // normStatus
    const byNorm={};
    nonExt.forEach(p=>{const s=normStatus(p);byNorm[s]=(byNorm[s]||0)+1;});
    log('\n📊 Setelah normStatus():');
    Object.entries(byNorm).sort((a,b)=>b[1]-a[1]).forEach(([st,cnt])=>{
      const cls=['absensi_ditutup','pdf_tercetak'].includes(st)?'ok':'';
      log(`  "${st}" → ${cnt}`+' dok',cls);
    });

    const pending=nonExt.filter(p=>['absensi_ditutup','pdf_tercetak'].includes(normStatus(p)))
      .sort((a,b)=>(b.tanggal||'').localeCompare(a.tanggal||''));

    log(`\n🔔 PENDING: ${pending.length} pelatihan`,pending.length>0?'ok':'warn');

    if(pending.length>0){
      let html=`<div class="card"><h3 style="color:#34d399;margin-bottom:12px;">🔔 ${pending.length} Pelatihan Perlu Tindakan</h3>
      <table><tr><th>Topik</th><th>Tgl</th><th>Status RAW</th><th>normStatus</th><th>ditutup_at</th></tr>`;
      pending.forEach(p=>{
        html+=`<tr><td><b>${p.topik||'–'}</b><br/><small style="color:#475569">${p.id}</small></td>
        <td>${p.tanggal||'–'}</td>
        <td><span class="badge badge-warn">${p.status||'–'}</span></td>
        <td><span class="badge badge-ok">${normStatus(p)}</span></td>
        <td style="font-size:10px;">${fmtAt(p.absensi_ditutup_at)}</td></tr>`;
      });
      html+='</table></div>';
      document.getElementById('result').innerHTML=html;
      log('\n✅ Data di atas HARUS muncul di Tugas Saya.','ok');
      log('Jika tidak muncul → kemungkinan cache browser. Coba hard refresh (Ctrl+Shift+R).','warn');
    } else {
      log('\n⚠️  Tidak ada pending.','warn');
      const fixable=nonExt.filter(p=>(p.status==='aktif'||!p.status)&&(p.absensi_ditutup_at||p.peserta_hadir!==undefined));
      if(fixable.length>0){
        log(`  → ${fixable.length} dokumen bisa diperbaiki otomatis`,'warn');
        log('  → Klik "Perbaiki Status Otomatis"','warn');
      } else {
        log('  → Belum ada pelatihan yang ditutup dari kiosk');
        log('  → Tutup absensi dari kiosk dulu, lalu klik Diagnostik lagi');
      }
      // Tabel semua pelatihan
      let html=`<div class="card"><h3 style="color:#fbbf24;margin-bottom:12px;">Semua Pelatihan (maks 30):</h3>
      <table><tr><th>Topik</th><th>Tgl</th><th>Status RAW</th><th>normStatus</th><th>ditutup_at</th><th>peserta_hadir</th></tr>`;
      nonExt.slice(0,30).forEach(p=>{
        const ns=normStatus(p);
        const nsc=['absensi_ditutup','pdf_tercetak'].includes(ns)?'badge-ok':'badge-warn';
        html+=`<tr><td>${p.topik||'–'}</td><td>${p.tanggal||'–'}</td>
        <td><span class="badge badge-warn">${p.status||'–'}</span></td>
        <td><span class="badge ${nsc}">${ns}</span></td>
        <td style="font-size:10px;">${fmtAt(p.absensi_ditutup_at)}</td>
        <td>${p.peserta_hadir??'–'}</td></tr>`;
      });
      html+='</table></div>';
      document.getElementById('result').innerHTML=html;
    }
  }catch(e){log('❌ ERROR: '+e.message,'err');}
}
document.getElementById('btnDiag').addEventListener('click',runDiag);

/* ─ Fix ─ */
document.getElementById('btnFix').addEventListener('click',async()=>{
  log('\n🔧 Memperbaiki status...');
  try{
    const snap=await getDocs(collection(db,'pelatihan'));
    let fixed=0;
    for(const d of snap.docs){
      const p={id:d.id,...d.data()};
      if(p.id.startsWith('EXT-'))continue;
      const needFix=(p.status==='aktif'||!p.status)&&(p.absensi_ditutup_at||p.peserta_hadir!==undefined);
      if(!needFix)continue;
      const now=new Date().toLocaleString('id-ID',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
      await updateDoc(doc(db,'pelatihan',p.id),{
        status:'absensi_ditutup',
        ...(!p.absensi_ditutup_at&&{absensi_ditutup_at:now})
      });
      log(`  ✅ ${p.topik||p.id} → absensi_ditutup`,'ok');
      fixed++;
    }
    log(fixed>0?`\n✅ ${fixed} dokumen diperbaiki. Klik Diagnostik lagi.`:'\n→ Tidak ada yang perlu diperbaiki.',fixed>0?'ok':'warn');
    if(fixed>0)runDiag();
  }catch(e){log('❌ ERROR: '+e.message,'err');}
});
</script>
</body>
</html>
