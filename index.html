<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMART · Sido Muncul</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #059669;
            --primary-dark: #047857;
            --accent: #10b981;
            --bg: #f0fdf9;
            --text: #0f172a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Background Animasi */
        .bg-blobs {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #f0fdf4, #ecfdf5, #f0fdf9);
            background-size: 400% 400%;
            animation: gradientBG 14s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            z-index: -1;
            opacity: 0.5;
        }

        /* Container Login */
        .login-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 90%;
            max-width: 400px;
            padding: 2.5rem 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.8);
            text-align: center;
            animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo { width: 80px; margin-bottom: 1.5rem; }

        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        h1 span { color: var(--primary); }
        p.subtitle { font-size: 0.85rem; color: #64748b; margin-bottom: 2rem; line-height: 1.4; }

        .form-group { text-align: left; margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; color: #475569; }
        
        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1.5px solid #e2e8f0;
            background: white;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.1); }

        .btn-login {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin-top: 1rem;
        }

        .btn-login:active { transform: scale(0.96); background: var(--primary-dark); }

        footer { margin-top: 2rem; font-size: 0.75rem; color: #94a3b8; }

        /* Toast Notification */
        #toast {
            position: fixed;
            top: 20px;
            right: -300px;
            background: #ef4444;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.9rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="bg-blobs"></div>
    <div class="blob" style="width: 300px; height: 300px; background: var(--primary); left: -100px; bottom: -100px;"></div>
    <div class="blob" style="width: 250px; height: 250px; background: var(--accent); right: -50px; top: -50px;"></div>

    <div class="login-card">
        <img src="logo.png" alt="Logo" class="logo">
        <h1>SMART <span>·</span> Sido Muncul</h1>
        <p class="subtitle">Sistem Manajemen Absensi<br>dan Rekap Training</p>

        <div class="form-group">
            <label>ID Karyawan / Perner</label>
            <input type="text" id="perner" placeholder="Contoh: 90004827" inputmode="numeric">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn-login" id="btnLogin">Masuk</button>

        <footer>PT Sido Muncul · HR-MI · 2026</footer>
    </div>

    <div id="toast">Gagal Login!</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

        // TEMPEL CONFIG FIREBASE ANDA DI SINI
        const firebaseConfig = {
            apiKey: "ISI_API_KEY",
            authDomain: "ISI_AUTH_DOMAIN",
            projectId: "ISI_PROJECT_ID",
            storageBucket: "ISI_STORAGE_BUCKET",
            messagingSenderId: "ISI_MESSAGING_ID",
            appId: "ISI_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const btn = document.getElementById('btnLogin');
        const toast = document.getElementById('toast');

        function showToast(msg, color = "#ef4444") {
            toast.innerText = msg;
            toast.style.background = color;
            toast.style.right = "20px";
            setTimeout(() => { toast.style.right = "-300px"; }, 3000);
        }

        btn.addEventListener('click', async () => {
            const perner = document.getElementById('perner').value;
            const pass = document.getElementById('password').value;

            if(!perner || !pass) return showToast("Harap isi semua bidang!");
            
            btn.innerText = "Memproses...";
            btn.disabled = true;

            // Di Firebase, kita pakai email format: perner@sidomuncul.com
            const email = `${perner}@sidomuncul.com`;

            try {
                await signInWithEmailAndPassword(auth, email, pass);
                showToast("Berhasil! Mengalihkan...", "#059669");
                setTimeout(() => { window.location.href = "app.html"; }, 1000);
            } catch (error) {
                console.error(error);
                showToast("ID atau Password salah!");
                btn.innerText = "Masuk";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
