.bg-pattern {
  position: fixed; inset: 0; z-index: -1;
  background-image: radial-gradient(#059669 0.5px, transparent 0.5px);
  background-size: 24px 24px;
  opacity: 0.05;
}

.login-card {
  width: 100%; max-width: 440px;
  background: white;
  border-radius: 40px;
  padding: 48px;
  box-shadow: 0 25px 50px -12px rgba(6, 78, 59, 0.08);
  border: 1px solid #f1f5f9;
  animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}

.input-group { position: relative; margin-bottom: 20px; }
.input-field {
  width: 100%;
  background-color: #f8fafc;
  border: 2px solid transparent;
  padding: 16px 16px 16px 52px;
  border-radius: 20px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 14px; font-weight: 600;
  transition: all 0.3s; outline: none;
  color: #1e293b;
}
.input-field::placeholder { color: #94a3b8; font-weight: 500; }
.input-field:focus {
  background-color: white;
  border-color: #059669;
  box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.1);
}
.input-icon {
  position: absolute; left: 20px; top: 50%;
  transform: translateY(-50%);
  color: #94a3b8; transition: all 0.3s; font-size: 16px;
}
.input-field:focus ~ .input-icon { color: #059669; }

.input-toggle {
  position: absolute; right: 20px; top: 50%;
  transform: translateY(-50%);
  color: #94a3b8; cursor: pointer;
  background: none; border: none; font-size: 15px;
  transition: color 0.2s;
}
.input-toggle:hover { color: #059669; }

.btn-login {
  width: 100%;
  background-color: #064e3b;
  color: white;
  padding: 18px;
  border-radius: 20px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 800; font-size: 13px;
  text-transform: uppercase; letter-spacing: 1.5px;
  border: none; cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 10px 20px -5px rgba(6, 78, 59, 0.3);
  display: flex; align-items: center; justify-content: center; gap: 10px;
  margin-top: 12px;
}
.btn-login:hover:not(:disabled) {
  background-color: #059669;
  transform: translateY(-2px);
  box-shadow: 0 15px 25px -5px rgba(6, 78, 59, 0.4);
}
.btn-login:active { transform: translateY(0); }
.btn-login:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

.logo-circle {
  width: 72px; height: 72px;
  background: #064e3b;
  border-radius: 24px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 24px;
  color: white; font-size: 32px;
  box-shadow: 0 15px 30px -10px rgba(6, 78, 59, 0.4);
}

.msg-box {
  padding: 12px 16px; border-radius: 16px;
  font-size: 12px; font-weight: 700;
  margin-bottom: 20px; text-align: center;
}
.msg-error { background: #fff1f2; color: #e11d48; border: 1px solid #ffe4e6; }
.msg-success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }

.spinner {
  width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Modal ganti password */
.modal-bg {
  display: none; position: fixed; inset: 0; z-index: 50;
  background: rgba(6, 78, 59, 0.5);
  backdrop-filter: blur(4px);
  align-items: center; justify-content: center; padding: 1rem;
}
.modal-bg.open { display: flex; }
.modal-card-pw {
  background: white; border-radius: 32px;
  width: 100%; max-width: 420px; padding: 40px;
  box-shadow: 0 25px 50px rgba(0,0,0,0.15);
  animation: slideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1);
}

.pw-bar { height: 4px; border-radius: 99px; transition: width 0.3s, background 0.3s; }

@keyframes shake {
  10%, 90% { transform: translate3d(-1px, 0, 0); }
  20%, 80% { transform: translate3d(2px, 0, 0); }
  30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
  40%, 60% { transform: translate3d(4px, 0, 0); }
}

@media (max-width: 480px) {
  .login-card {
    padding: 32px 24px; border-radius: 0;
    height: 100vh; max-width: none;
    display: flex; flex-direction: column; justify-content: center;
    border: none;
  }
}

  <!-- Toast -->

  <div id="toastCont" class="fixed top-4 right-4 z-[9999] flex flex-col gap-2 pointer-events-none"></div>

  <script type="module">
    import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, updatePassword }
                               from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, addDoc, collection, serverTimestamp }
                               from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey:"AIzaSyDTVdA6QD_FsHeHVMm4l67NJP5_rpL_JmI",
      authDomain:"absensipelatihan-844d8.firebaseapp.com",
      projectId:"absensipelatihan-844d8",
      storageBucket:"absensipelatihan-844d8.firebasestorage.app",
      messagingSenderId:"518545818905",
      appId:"1:518545818905:web:d56035cc0678c58328f188"
    };
    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    const SUPERADMIN_PERNER = "200596";
    const SUPERADMIN_EMAIL  = "superadmin@absensipelatihan.com";

    /* helpers */
    function showMsg(txt, type='error'){
      const b=document.getElementById('msgBox'), t=document.getElementById('msgText');
      b.className=`msg-box ${type==='error'?'msg-error':'msg-success'}`;
      t.textContent=txt; b.style.display='block';
    }
    function hideMsg(){ document.getElementById('msgBox').style.display='none'; }

    function toast(msg, type='success'){
      const el=document.createElement('div');
      el.style.pointerEvents='auto';
      el.className=`px-5 py-3 rounded-2xl text-xs font-black uppercase tracking-widest text-white shadow-xl flex items-center gap-2 ${type==='success'?'bg-emerald-800':'bg-rose-600'}`;
      el.innerHTML=`<i class="fas ${type==='success'?'fa-check-circle':'fa-times-circle'}"></i> ${msg}`;
      document.getElementById('toastCont').appendChild(el);
      setTimeout(()=>el.remove(),3500);
    }

    function errMsg(code){
      const m={
        'auth/wrong-password'        :'Password salah. Silakan coba lagi.',
        'auth/user-not-found'        :'Akun tidak ditemukan. Periksa nomor Perner.',
        'auth/too-many-requests'     :'Terlalu banyak percobaan. Coba beberapa menit lagi.',
        'auth/invalid-credential'    :'Perner atau password tidak valid.',
        'auth/network-request-failed':'Koneksi gagal. Periksa jaringan Anda.',
      };
      return m[code]||`Terjadi kesalahan: ${code}`;
    }

    /* toggle visibility */
    document.getElementById('togglePw').addEventListener('click',()=>{
      const inp=document.getElementById('inputPassword'), ico=document.getElementById('eyeIcon');
      const h=inp.type==='password'; inp.type=h?'text':'password';
      ico.className=h?'far fa-eye-slash':'far fa-eye';
    });
    window.toggleField=(id,iid)=>{
      const e=document.getElementById(id), i=document.getElementById(iid);
      const h=e.type==='password'; e.type=h?'text':'password';
      i.className=h?'far fa-eye-slash':'far fa-eye';
    };

    /* login */
    document.getElementById('loginForm').addEventListener('submit', async e=>{
      e.preventDefault(); hideMsg();
      const perner=document.getElementById('inputPerner').value.trim();
      const pw=document.getElementById('inputPassword').value;
      if(!perner){showMsg('Nomor Perner tidak boleh kosong.');return;}
      if(!pw){showMsg('Password tidak boleh kosong.');return;}

      const btn=document.getElementById('submitBtn');
      document.getElementById('btnLabel').textContent='Memproses…';
      document.getElementById('btnLoader').style.display='block';
      document.getElementById('btnArrow').style.display='none';
      btn.disabled=true;

      const email=perner===SUPERADMIN_PERNER?SUPERADMIN_EMAIL:`${perner}@absensipelatihan.com`;
      try{
        const cred=await signInWithEmailAndPassword(auth,email,pw);
        const uid=cred.user.uid;
        const snap=await getDoc(doc(db,'users',uid));
        if(!snap.exists()){await auth.signOut();showMsg('Data akun tidak ditemukan. Hubungi administrator.');return;}
        const data=snap.data();
        if(data.status==='nonaktif'){await auth.signOut();showMsg('Akun Anda telah dinonaktifkan. Hubungi administrator.');return;}

        sessionStorage.setItem('uid',uid); sessionStorage.setItem('role',data.role);
        sessionStorage.setItem('nama',data.nama_lengkap); sessionStorage.setItem('unit',data.unit||'');
        sessionStorage.setItem('jabatan',data.jabatan||''); sessionStorage.setItem('perner',perner);
        sessionStorage.setItem('__ae',btoa(email)); sessionStorage.setItem('__ap',btoa(pw));

        await addDoc(collection(db,'log_aktivitas'),{aksi:'login_berhasil',user_id:uid,role:data.role,timestamp:serverTimestamp(),detail_sesudah:JSON.stringify({perner,nama:data.nama_lengkap})});

        if(data.first_login===true){
          btn.disabled=false;
          document.getElementById('btnLabel').textContent='Masuk ke Sistem';
          document.getElementById('btnLoader').style.display='none';
          document.getElementById('btnArrow').style.display='inline';
          document.getElementById('modalChangePw').classList.add('open');
          return;
        }
        toast('Selamat datang, '+data.nama_lengkap+'!');
        setTimeout(()=>{window.location.href='app.html';},800);
      }catch(err){
        try{await addDoc(collection(db,'log_aktivitas'),{aksi:'login_gagal',user_id:'unknown',timestamp:serverTimestamp(),detail_sesudah:JSON.stringify({perner,error:err.code})});}catch(_){}
        showMsg(errMsg(err.code));
      }finally{
        btn.disabled=false;
        document.getElementById('btnLabel').textContent='Masuk ke Sistem';
        document.getElementById('btnLoader').style.display='none';
        document.getElementById('btnArrow').style.display='inline';
      }
    });

    /* password strength */
    document.getElementById('newPw1').addEventListener('input',()=>{
      const v=document.getElementById('newPw1').value; let s=0;
      if(v.length>=8)s++; if(v.length>=12)s++;
      if(/[A-Z]/.test(v))s++; if(/[0-9]/.test(v))s++; if(/[^A-Za-z0-9]/.test(v))s++;
      const pct=Math.min(100,s*20);
      const cols=['#ef4444','#f97316','#eab308','#22c55e','#064e3b'];
      const hints=['Terlalu Lemah','Lemah','Cukup','Kuat','Sangat Kuat'];
      const bar=document.getElementById('pwStrBar');
      bar.style.width=pct+'%'; bar.style.background=v.length?(cols[s-1]||cols[0]):'';
      document.getElementById('pwStrHint').textContent=v.length?(hints[s-1]||''):'';
      checkMatch(); checkSave();
    });
    document.getElementById('newPw2').addEventListener('input',()=>{checkMatch();checkSave();});
    function checkMatch(){
      const p1=document.getElementById('newPw1').value, p2=document.getElementById('newPw2').value;
      const el=document.getElementById('pwMatchHint');
      if(!p2){el.textContent='';return;}
      if(p1===p2){el.textContent='✓ Password Cocok';el.style.color='#059669';}
      else{el.textContent='✗ Tidak Cocok';el.style.color='#e11d48';}
    }
    function checkSave(){
      document.getElementById('btnSaveNewPw').disabled=
        !(document.getElementById('newPw1').value.length>=8&&document.getElementById('newPw1').value===document.getElementById('newPw2').value);
    }

    /* save new password */
    document.getElementById('btnSaveNewPw').addEventListener('click',async()=>{
      const pw=document.getElementById('newPw1').value;
      if(pw!==document.getElementById('newPw2').value||pw.length<8)return;
      document.getElementById('savePwLabel').textContent='Menyimpan…';
      document.getElementById('savePwLoader').style.display='block';
      document.getElementById('btnSaveNewPw').disabled=true;
      try{
        await updatePassword(auth.currentUser,pw);
        const uid=sessionStorage.getItem('uid');
        await updateDoc(doc(db,'users',uid),{first_login:false});
        sessionStorage.setItem('__ap',btoa(pw));
        await addDoc(collection(db,'log_aktivitas'),{aksi:'ganti_password_pertama',user_id:uid,timestamp:serverTimestamp(),detail_sesudah:'Password berhasil diganti'});
        toast('Password berhasil diperbarui!');
        document.getElementById('modalChangePw').classList.remove('open');
        setTimeout(()=>{window.location.href='app.html';},800);
      }catch(e){toast('Gagal: '+e.message,'error');}
      finally{
        document.getElementById('savePwLabel').textContent='Simpan & Lanjutkan';
        document.getElementById('savePwLoader').style.display='none';
        document.getElementById('btnSaveNewPw').disabled=false;
      }
    });

    window.onerror=(msg,src,line,col,err)=>{addDoc(collection(db,'log_aktivitas'),{aksi:'system_error',timestamp:serverTimestamp(),user_id:sessionStorage.getItem('uid')||'unknown',detail_sesudah:JSON.stringify({message:msg,source:src,line,col,stack:err?.stack})}).catch(()=>{});};
    window.onunhandledrejection=(e)=>{addDoc(collection(db,'log_aktivitas'),{aksi:'system_error',timestamp:serverTimestamp(),user_id:sessionStorage.getItem('uid')||'unknown',detail_sesudah:JSON.stringify({message:e.reason?.message,stack:e.reason?.stack})}).catch(()=>{});};
  </script>

</body>
